server {
    listen 8080;
    server_name _;
    root /var/www/chat;
    index index.html;

    # Session 管理 API
    location /v1/sessions/ {
        proxy_pass http://127.0.0.1:5050/v1/sessions/;
        proxy_set_header Host $host;
        proxy_read_timeout 300s;
    }
    # File API
    location /v1/files/ {
        proxy_pass http://127.0.0.1:5050/v1/files/;
        proxy_set_header Host $host;
        client_max_body_size 50m;
    }
    # WebSocket — 实时推送
    location /v1/ws {
        proxy_pass http://127.0.0.1:5050/v1/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
    }
    # Auth API + Daily API — 必须在 /v1/ 前面！
    location /v1/api/ {
        proxy_pass http://127.0.0.1:5050/v1/api/;
        proxy_set_header Host $host;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }
    # Chat API → Gateway
    location /v1/ {
        proxy_pass http://127.0.0.1:18789;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
    # 聊天页面
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
}
