<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chat</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
  <style>
    :root {
      /* 背景 — 暖白系 */
      --bg:              #fafaf8;
      --bg-card:         #ffffff;
      --bg-hover:        #f0f0ed;
      --bg-input:        #f5f5f3;
      /* 文字 — 灰黑系 */
      --text-primary:    #1a1a1a;
      --text-secondary:  #8c8c8c;
      --text-tertiary:   #b0b0b0;
      /* 边框/分割 */
      --border:          #e8e8e4;
      --divider:         #f0f0ed;
      /* 强调 */
      --accent:          #2c2c2c;
      --accent-hover:    #000000;
      --accent-soft:     #e8e8e4;
      /* 状态 */
      --success:         #7d9f7a;
      --warning:         #c9a96e;
      --danger:          #d4776a;
      /* 圆角 */
      --radius-sm:       4px;
      --radius-md:       8px;
      --radius-lg:       12px;
      /* 阴影 */
      --shadow-sm:       0 1px 2px rgba(0,0,0,0.04);
      --shadow-md:       0 2px 8px rgba(0,0,0,0.06);
      /* 字体 */
      --font:            "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
      --font-mono:       "JetBrains Mono", "Fira Code", "SF Mono", monospace;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
    }
    /* ==================== 三栏布局 ==================== */
    /* 左栏 — 会话列表 */
    .conv-panel {
      width: 260px;
      min-width: 260px;
      background: var(--bg-card);
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      overflow: hidden;
      transition: width 0.28s ease, min-width 0.28s ease;
    }
    .conv-panel.collapsed {
      width: 0;
      min-width: 0;
      border-right: none;
      overflow: hidden;
    }
    .conv-panel .conv-section {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      padding: 14px 12px 12px;
    }
    /* 中栏 — 消息区 */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    /* 右栏 — 设置面板 */
    .settings-panel {
      width: 280px;
      min-width: 280px;
      background: var(--bg-card);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      border-left: 1px solid var(--border);
      overflow-y: auto;
      transition: width 0.28s ease, min-width 0.28s ease, padding 0.28s ease;
    }
    .settings-panel.collapsed {
      width: 0;
      min-width: 0;
      padding: 0;
      border-left: none;
      overflow: hidden;
    }
    .settings-panel h2 {
      font-size: 16px;
      font-weight: 600;
      color: var(--accent);
      white-space: nowrap;
    }
    .settings-panel label {
      font-size: 13px;
      color: var(--text-secondary);
      display: block;
      margin-bottom: 4px;
      white-space: nowrap;
    }
    .settings-panel input, .settings-panel select {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .settings-panel input:focus, .settings-panel select:focus { border-color: var(--accent); }
    .settings-panel .hint {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.4;
    }
    .settings-panel button {
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .settings-panel .btn-connect {
      background: var(--accent);
      color: white;
    }
    .settings-panel .btn-connect:hover { background: var(--accent-hover); }
    .settings-panel .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }
    /* 面板折叠切换按钮 */
    .panel-toggle {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 18px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      line-height: 1;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .panel-toggle:hover {
      color: var(--accent);
      background: rgba(233, 69, 96, 0.1);
    }
    .panel-toggle.active { color: var(--accent); }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #666;
    }
    .status-dot.connected { background: #4caf50; }
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .chat-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .chat-header h1 { font-size: 16px; font-weight: 600; }
    .chat-header .model-badge {
      font-size: 12px;
      background: var(--accent);
      color: white;
      padding: 4px 10px;
      border-radius: 12px;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.6;
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
      position: relative;
    }
    .message.user {
      align-self: flex-end;
      background: var(--message-user);
      border-bottom-right-radius: 4px;
    }
    .message.assistant {
      align-self: flex-start;
      background: var(--message-assistant);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .message .msg-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .message.user .msg-header { flex-direction: row-reverse; }
    .message .msg-avatar {
      width: 24px; height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
    }
    .message.user .msg-avatar { background: #2a3a5c; }
    .message.assistant .msg-avatar { background: #2a3a5c; }
    .message .role {
      font-size: 11px;
      color: var(--text-secondary);
      font-weight: 600;
    }
    .message .msg-time {
      font-size: 10px;
      color: var(--text-secondary);
      opacity: 0.7;
    }
    .message .content {
      line-height: 1.6;
    }
    .message .content p { margin: 0; }
    .message .content p + p { margin-top: 8px; }
    .message .content pre {
      background: #0d0d1a;
      border-radius: 6px;
      padding: 12px;
      overflow-x: auto;
      margin: 8px 0;
      font-size: 13px;
    }
    .message .content code {
      background: #0d0d1a;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
    }
    .message .content pre code { padding: 0; background: none; }
    .message .content .error-msg {
      color: #f87171;
      font-style: italic;
    }
    /* 附件/文件标签 */
    .message .attachments {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 6px;
    }
    .message .attachment-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 11px;
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--border);
      color: var(--text-secondary);
    }
    .message .attachment-tag .att-icon { font-size: 12px; }
    .message .attachment-tag .att-name {
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    /* 选中文件标签展示（F30） */
    .file-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 8px 24px 0;
      min-height: 0;
    }
    .file-tags:empty { display: none; }
    .file-tags .file-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      border-radius: 6px;
      background: rgba(233, 69, 96, 0.12);
      border: 1px solid rgba(233, 69, 96, 0.25);
      font-size: 12px;
      color: var(--text-primary);
    }
    .file-tag .tag-icon { font-size: 12px; }
    .file-tag .tag-name {
      max-width: 150px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .file-tag .tag-remove {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.1);
      color: var(--text-secondary);
      font-size: 10px;
      cursor: pointer;
      transition: all 0.15s;
      padding: 0;
      margin-left: 2px;
      flex-shrink: 0;
    }
    .file-tag .tag-remove:hover {
      background: var(--accent);
      color: white;
    }
    /* DF11: 命令栏文件附件标签 */
    .cmd-file-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 8px 12px 0;
      min-height: 0;
    }
    .cmd-file-tags:empty { display: none; }
    .cmd-file-tags .file-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      border-radius: 6px;
      background: rgba(var(--accent-rgb, 99, 102, 241), 0.12);
      border: 1px solid rgba(var(--accent-rgb, 99, 102, 241), 0.25);
      font-size: 12px;
      color: var(--text-primary);
    }
    .cmd-file-tags .file-tag .tag-icon { font-size: 12px; }
    .cmd-file-tags .file-tag .tag-name {
      max-width: 150px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .cmd-file-tags .file-tag .tag-remove {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.1);
      color: var(--text-secondary);
      font-size: 10px;
      cursor: pointer;
      transition: all 0.15s;
      padding: 0;
      margin-left: 2px;
      flex-shrink: 0;
    }
    .cmd-file-tags .file-tag .tag-remove:hover {
      background: var(--accent);
      color: white;
    }
    .input-area {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 12px;
    }
    .input-area textarea {
      flex: 1;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--bg-input);
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      resize: none;
      min-height: 48px;
      max-height: 160px;
      transition: border-color 0.2s;
    }
    .input-area textarea:focus { border-color: var(--accent); }
    .input-area .attach-btn {
      width: 48px;
      height: 48px;
      padding: 0;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--bg-input);
      color: var(--text-secondary);
      font-size: 18px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      align-self: flex-end;
      flex-shrink: 0;
    }
    .input-area .attach-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(108, 92, 231, 0.1);
    }
    .input-area button[type="submit"],
    .input-area button:not(.attach-btn) {
      padding: 12px 20px;
      border-radius: 12px;
      border: none;
      background: var(--accent);
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      align-self: flex-end;
    }
    .input-area button:hover:not(:disabled) { background: var(--accent-hover); }
    .input-area button:disabled { background: #555; cursor: not-allowed; }
    .typing-indicator { display: flex; gap: 4px; padding: 8px 0; }
    .typing-indicator span {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--text-secondary);
      animation: bounce 1.4s infinite ease-in-out;
    }
    .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
    .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-8px); }
    }
    /* Tab 导航 */
    .tab-bar {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      padding: 0 24px;
    }
    .tab-btn {
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      outline: none;
      white-space: nowrap;
    }
    .tab-btn:hover { color: var(--text-primary); }
    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
      font-weight: 600;
    }
    .tab-content { display: none; flex-direction: column; flex: 1; min-height: 0; }
    .tab-content.active { display: flex; }
    /* ==================== 文件浏览器 ==================== */
    #tab-files {
      /* .tab-content handles display:none/flex; this just fills parent */
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }
    /* ==================== 每日 Dashboard ==================== */
    #tab-daily {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      background: var(--bg);
      display: flex;
      flex-direction: column;
    }
    #tab-daily .dashboard-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 24px 24px 0;
    }
    .dashboard-toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      max-width: 1200px;
      margin-left: auto;
      margin-right: auto;
    }
    .toolbar-btn {
      font-size: 13px;
      padding: 6px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-hover);
      color: var(--text-primary);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .toolbar-btn:hover {
      border-color: var(--accent);
    }
    .toolbar-btn.active {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }
    .toolbar-hint {
      font-size: 12px;
      color: var(--text-secondary);
    }
    /* ==================== 卡片网格 ==================== */
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      max-width: 1200px;
      margin: 0 auto 24px;
    }
    .dashboard-grid .card-placeholder {
      background: var(--bg-hover);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      cursor: pointer;
      transition: box-shadow 0.2s, transform 0.15s;
      min-height: 120px;
    }
    .dashboard-grid .card-placeholder:hover {
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      transform: translateY(-1px);
    }
    .dashboard-grid .card-placeholder.disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .card-placeholder .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .card-placeholder .card-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .card-placeholder .card-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 8px;
      background: var(--border);
      color: var(--text-secondary);
    }
    .card-placeholder .card-summary {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
    }
    .card-placeholder .card-expand-btn {
      font-size: 18px;
      color: var(--text-secondary);
      transition: transform 0.25s;
      flex-shrink: 0;
      margin-left: 4px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
    }
    .card-placeholder .card-close-btn {
      display: none;
      font-size: 20px;
      color: var(--text-secondary);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
      flex-shrink: 0;
    }
    .card-placeholder .card-close-btn:hover {
      color: var(--text-primary);
    }
    /* 展开模式 */
    .card-placeholder.expanded {
      grid-column: 1 / -1;
      min-height: 200px;
      padding: 24px;
    }
    .card-placeholder.expanded .card-name {
      font-size: 20px;
    }
    .card-placeholder.expanded .card-expand-btn {
      display: none;
    }
    .card-placeholder.expanded .card-close-btn {
      display: inline;
    }
    .card-placeholder .card-body {
      display: none;
      border-top: 1px solid var(--border);
      margin-top: 4px;
      padding-top: 12px;
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.6;
      animation: cardExpand 0.2s ease;
    }
    .card-placeholder.expanded .card-body {
      display: block;
      padding-top: 16px;
    }
    @keyframes cardExpand {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .card-placeholder .card-body-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 0;
      color: var(--text-secondary);
      opacity: 0.5;
      font-size: 12px;
    }
    /* DF12: NewsCard 缩略模式 */
    .card-body .news-collapsed {
      padding: 12px 16px;
    }
    .news-collapsed .news-date {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }
    .news-collapsed .news-summary {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 10px;
    }
    .news-collapsed .news-title-list {
      list-style: none;
      padding: 0;
      margin: 0 0 10px 0;
    }
    .news-collapsed .news-title-item {
      padding: 4px 0;
      font-size: 13px;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      border-bottom: 1px solid var(--border);
    }
    .news-collapsed .news-title-item:last-child {
      border-bottom: none;
    }
    .news-collapsed .news-expand-hint {
      font-size: 11px;
      color: var(--accent);
      cursor: pointer;
      text-align: center;
    }
    .news-collapsed .news-expand-hint:hover {
      text-decoration: underline;
    }
    /* DF15: 新闻工具栏 */
    .news-collapsed .news-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .news-toolbar .news-refresh-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 2px 10px;
      font-size: 12px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
    }
    .news-toolbar .news-refresh-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .news-toolbar .news-refresh-btn.spinning {
      animation: spin 0.8s linear infinite;
    }
    /* DF16: TodoCard 缩略模式 */
    .card-body .todo-collapsed {
      padding: 12px 16px;
    }
    .todo-collapsed .todo-person-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      font-size: 13px;
    }
    .todo-collapsed .todo-person-name {
      font-weight: 600;
      color: var(--text-primary);
      min-width: 50px;
    }
    .todo-collapsed .todo-person-count {
      color: var(--accent);
      font-size: 12px;
    }
    .todo-collapsed .todo-person-bar {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    .todo-collapsed .todo-person-bar-fill {
      height: 100%;
      border-radius: 3px;
      background: var(--accent);
      transition: width 0.3s ease;
    }
    .todo-collapsed .todo-week-summary {
      margin-top: 8px;
      font-size: 12px;
      color: var(--text-secondary);
      text-align: center;
    }
    .todo-collapsed .todo-expand-hint {
      font-size: 11px;
      color: var(--accent);
      cursor: pointer;
      text-align: center;
      margin-top: 4px;
    }

      .dashboard-grid { grid-template-columns: 1fr; }
      #tab-daily .dashboard-scroll { padding: 16px 16px 0; }
      .dashboard-command-bar { padding: 10px 12px; }
      .dashboard-command-bar .cmd-hint { display: none; }
    }
    .dashboard-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 200px;
      color: var(--text-secondary);
      font-size: 14px;
    }
    /* 底部指令输入框 */
    .dashboard-command-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border-top: 1px solid var(--border);
      background: var(--bg-hover);
      flex-shrink: 0;
    }
    .dashboard-command-bar .cmd-input {
      flex: 1;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    .dashboard-command-bar .cmd-input:focus {
      border-color: var(--accent);
    }
    .dashboard-command-bar .cmd-input::placeholder {
      color: var(--text-secondary);
      opacity: 0.6;
    }
    .dashboard-command-bar .cmd-send {
      padding: 10px 20px;
      border-radius: 10px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    .dashboard-command-bar .cmd-send:hover {
      opacity: 0.85;
    }
    .dashboard-command-bar .cmd-send:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .dashboard-command-bar .cmd-hint {
      font-size: 12px;
      color: var(--text-secondary);
      margin-right: 4px;
      white-space: nowrap;
    }
    .dashboard-command-bar .cmd-attach-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 16px;
      cursor: pointer;
      color: var(--text-secondary);
      transition: background 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }
    .dashboard-command-bar .cmd-attach-btn:hover {
      background: var(--bg-hover);
      border-color: var(--accent);
      color: var(--accent);
    }
    /* DF9: 拖拽上传高亮 */
    .dashboard-command-bar.drag-over {
      border-color: var(--accent);
      background: rgba(var(--accent-rgb, 99, 102, 241), 0.08);
      box-shadow: 0 0 0 2px var(--accent);
    }
    /* 命令响应 toast */
    .dashboard-toast {
      position: fixed;
      bottom: 80px;
      right: 24px;
      z-index: 500;
      padding: 12px 36px 12px 20px;
      border-radius: 10px;
      font-size: 13px;
      color: #fff;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
      animation: toastIn 0.25s ease;
      max-width: 420px;
      line-height: 1.5;
      cursor: pointer;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .dashboard-toast .toast-close {
      position: absolute;
      top: 8px;
      right: 10px;
      background: none;
      border: none;
      color: rgba(255,255,255,0.8);
      font-size: 16px;
      cursor: pointer;
      padding: 0;
      line-height: 1;
    }
    .dashboard-toast .toast-close:hover {
      color: #fff;
    }
    .dashboard-toast.success {
      background: #2e7d32;
    }
    .dashboard-toast.info {
      background: #1565c0;
    }
    .dashboard-toast.error {
      background: #c62828;
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes toastOut {
      from { opacity: 1; transform: translateY(0); }
      to { opacity: 0; transform: translateY(8px); }
    }
    /* 添加卡片按钮 */
    .dashboard-grid .card-add {
      background: var(--bg-hover);
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      min-height: 120px;
      color: var(--text-secondary);
      font-size: 14px;
      gap: 8px;
    }
    .dashboard-grid .card-add:hover {
      border-color: var(--accent);
      background: var(--bg-hover, rgba(255,255,255,0.04));
    }
    .dashboard-grid .card-add .add-icon {
      font-size: 24px;
      font-weight: 300;
    }
    /* 卡片选择弹窗 */
    .modal-backdrop {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-backdrop.show { display: flex; }
    .modal-dialog {
      background: var(--bg-secondary, #1e1e2e);
      border: 1px solid var(--border, #333);
      border-radius: 16px;
      width: 480px;
      max-width: 90vw;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      animation: modalIn 0.2s ease;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px 12px;
      border-bottom: 1px solid var(--border, #333);
    }
    .modal-header h3 {
      margin: 0;
      font-size: 18px;
      color: var(--text-primary);
    }
    .modal-close {
      font-size: 22px;
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 0 4px;
    }
    .modal-close:hover { color: var(--text-primary); }
    .modal-body {
      padding: 16px 24px 24px;
    }
    .modal-card-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid var(--border, #333);
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .modal-card-item:hover {
      border-color: var(--accent);
      background: var(--bg-hover, rgba(255,255,255,0.04));
    }
    .modal-card-item .card-icon {
      font-size: 24px;
      flex-shrink: 0;
    }
    .modal-card-item .card-info {
      flex: 1;
      min-width: 0;
    }
    .modal-card-item .card-info-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .modal-card-item .card-info-desc {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 2px;
    }
    .modal-card-item .card-add-btn {
      font-size: 13px;
      padding: 4px 12px;
      border-radius: 8px;
      border: 1px solid var(--accent);
      background: transparent;
      color: var(--accent);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      flex-shrink: 0;
    }
    .modal-card-item .card-add-btn:hover {
      background: var(--accent);
      color: #fff;
    }
    .modal-empty {
      text-align: center;
      padding: 24px;
      color: var(--text-secondary);
      font-size: 14px;
    }
    .file-browser {
      display: flex;
      flex: 1;
      min-height: 0;
    }
    .file-tree {
      width: 260px;
      min-width: 200px;
      max-width: 360px;
      background: var(--bg-card);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      overflow-x: hidden;
      padding: 8px 0;
    }
    .file-tree-header {
      padding: 10px 16px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 4px;
    }
    .tree-item {
      display: flex;
      align-items: center;
      padding: 6px 12px 6px 0;
      cursor: pointer;
      font-size: 13px;
      color: var(--text-primary);
      user-select: none;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .tree-item:hover { background: rgba(233, 69, 96, 0.08); }
    .tree-item.active { background: rgba(233, 69, 96, 0.16); color: var(--accent); }
    .tree-toggle {
      width: 20px;
      min-width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: var(--text-secondary);
      transition: transform 0.15s;
      flex-shrink: 0;
    }
    .tree-toggle.expanded { transform: rotate(90deg); }
    .tree-toggle.empty { visibility: hidden; }
    .tree-icon {
      width: 20px;
      min-width: 20px;
      text-align: center;
      font-size: 14px;
      flex-shrink: 0;
    }
    .tree-name {
      margin-left: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
    }
    .tree-children {
      overflow: hidden;
      transition: max-height 0.2s ease;
    }
    .tree-children.collapsed {
      max-height: 0 !important;
    }

    /* ==================== 拖拽上传区域 (Phase 3) ==================== */
    .upload-dropzone {
      margin: 4px 8px;
      padding: 16px 12px;
      border: 2px dashed var(--border);
      border-radius: 8px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 12px;
      transition: all 0.2s;
      cursor: default;
      user-select: none;
    }
    .upload-dropzone .dz-icon { font-size: 24px; display: block; margin-bottom: 4px; }
    .upload-dropzone.drag-over {
      border-color: var(--accent);
      background: rgba(233, 69, 96, 0.1);
      color: var(--accent);
    }
    .upload-progress {
      margin: 6px 8px;
      padding: 6px 10px;
      background: rgba(233, 69, 96, 0.08);
      border-radius: 6px;
      display: none;
    }
    .upload-progress.show { display: block; }
    .upload-progress .up-label {
      font-size: 11px;
      color: var(--text-secondary);
      margin-bottom: 4px;
      display: flex;
      justify-content: space-between;
    }
    .upload-progress .up-bar-bg {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .upload-progress .up-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #f0974c);
      border-radius: 2px;
      transition: width 0.15s;
      width: 0%;
    }

    .file-viewer {
      flex: 1;
      min-width: 0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .file-viewer .placeholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-secondary);
      font-size: 14px;
    }
    .file-viewer .placeholder .icon { font-size: 48px; }
    .resize-handle {
      width: 4px;
      cursor: col-resize;
      background: transparent;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .resize-handle:hover { background: var(--accent); }
    /* ==================== 面包屑导航 ==================== */
    .tree-toggle-btn {
      display: none;
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 20px;
      cursor: pointer;
      padding: 4px 8px;
      margin-right: 4px;
      border-radius: 4px;
      flex-shrink: 0;
      line-height: 1;
    }
    .tree-toggle-btn:hover { background: rgba(233,69,96,0.12); color: var(--accent); }
    .tree-drawer-header {
      display: none;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }
    .tree-drawer-header span { font-size: 13px; font-weight: 600; color: var(--text-primary); }
    .tree-drawer-close {
      background: none; border: none;
      color: var(--text-secondary); font-size: 20px;
      cursor: pointer; padding: 2px 6px; border-radius: 4px;
      line-height: 1;
    }
    .tree-drawer-close:hover { background: rgba(233,69,96,0.12); color: var(--accent); }
    .tree-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 99;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .tree-backdrop.show { display: block; opacity: 1; }
    .breadcrumb {
      display: flex;
      align-items: center;
      padding: 8px 16px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      flex-shrink: 0;
      overflow-x: auto;
      white-space: nowrap;
      gap: 2px;
      min-height: 36px;
    }
    .breadcrumb::-webkit-scrollbar { height: 4px; }
    .breadcrumb::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .breadcrumb-item {
      color: var(--text-secondary);
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
    }
    .breadcrumb-item:hover {
      color: var(--text-primary);
      background: rgba(233, 69, 96, 0.1);
    }
    .breadcrumb-item.current {
      color: var(--accent);
      font-weight: 600;
      cursor: default;
    }
    .breadcrumb-item.current:hover {
      background: transparent;
    }
    .breadcrumb-item.root-icon {
      font-size: 15px;
      padding: 2px 4px;
    }
    .breadcrumb-separator {
      color: var(--text-secondary);
      font-size: 11px;
      padding: 0 2px;
      user-select: none;
    }
    /* ==================== 文件查看器 ==================== */
    .viewer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .viewer-header .file-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .viewer-header .file-name .f-icon { font-size: 16px; }
    .viewer-header .file-lang {
      font-size: 11px;
      color: var(--text-secondary);
      background: var(--bg);
      padding: 2px 8px;
      border-radius: 10px;
      text-transform: uppercase;
    }
    .viewer-body {
      flex: 1;
      overflow: auto;
      min-height: 0;
    }
    .viewer-body pre {
      margin: 0;
      padding: 0;
      border-radius: 0;
      min-height: 100%;
    }
    .viewer-body code {
      padding: 0;
      background: none;
    }
    .code-with-lines {
      display: flex;
      min-height: 100%;
    }
    .line-numbers {
      min-width: 48px;
      text-align: right;
      padding: 12px 8px 12px 12px;
      background: rgba(0,0,0,0.2);
      user-select: none;
      font-family: 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.5;
      color: var(--text-secondary);
    }
    .line-numbers span {
      display: block;
    }
    .code-content {
      flex: 1;
      min-width: 0;
      padding: 12px 16px;
      overflow-x: auto;
      font-family: 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.5;
    }
    .viewer-loading {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-secondary);
      font-size: 14px;
    }
    .viewer-error {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--accent);
      font-size: 14px;
    }
    .image-preview-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
      padding: 16px;
      background: repeating-conic-gradient(var(--bg-card) 0% 25%, transparent 0% 50%) 50% / 20px 20px;
    }
    .image-preview-img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 4px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
      background: transparent;
    }
    .image-info {
      position: absolute;
      bottom: 12px;
      right: 16px;
      font-size: 11px;
      color: var(--text-secondary);
      background: rgba(0,0,0,0.5);
      padding: 2px 8px;
      border-radius: 10px;
    }
    .truncate-notice {
      flex-shrink: 0;
      padding: 8px 16px;
      background: rgba(255,193,7,0.1);
      border-bottom: 1px solid rgba(255,193,7,0.3);
      color: #ffc107;
      font-size: 12px;
      text-align: center;
    }
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-secondary);
    }
    /* ==================== Markdown 预览 ==================== */
    .markdown-body {
      padding: 24px 32px;
      line-height: 1.7;
      color: var(--text-primary);
      overflow-y: auto;
    }
    .markdown-body h1, .markdown-body h2, .markdown-body h3,
    .markdown-body h4, .markdown-body h5, .markdown-body h6 {
      margin-top: 24px;
      margin-bottom: 16px;
      font-weight: 600;
      line-height: 1.25;
      color: var(--accent);
    }
    .markdown-body h1 { font-size: 28px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
    .markdown-body h2 { font-size: 22px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
    .markdown-body h3 { font-size: 18px; }
    .markdown-body h4 { font-size: 16px; }
    .markdown-body p { margin-bottom: 16px; }
    .markdown-body ul, .markdown-body ol { margin-bottom: 16px; padding-left: 24px; }
    .markdown-body li { margin-bottom: 4px; }
    .markdown-body blockquote {
      border-left: 3px solid var(--accent);
      padding: 4px 16px;
      margin: 16px 0;
      color: var(--text-secondary);
      background: rgba(233,69,96,0.05);
    }
    .markdown-body table {
      border-collapse: collapse;
      margin: 16px 0;
      width: 100%;
    }
    .markdown-body th, .markdown-body td {
      border: 1px solid var(--border);
      padding: 8px 12px;
      text-align: left;
    }
    .markdown-body th { background: var(--bg-card); font-weight: 600; }
    .markdown-body pre {
      background: #0d0d1a;
      border-radius: 6px;
      padding: 16px;
      overflow-x: auto;
      margin: 16px 0;
      font-size: 13px;
      line-height: 1.5;
    }
    .markdown-body code {
      background: rgba(233,69,96,0.1);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
    }
    .markdown-body pre code { background: none; padding: 0; }
    .markdown-body hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 24px 0;
    }
    .markdown-body a {
      color: var(--accent);
      text-decoration: none;
    }
    .markdown-body a:hover { text-decoration: underline; }
    .markdown-body img { max-width: 100%; border-radius: 4px; margin: 16px 0; }
    .empty-state .icon { font-size: 48px; }
    .empty-state p { font-size: 15px; }
    /* ==================== Toast 通知系统 ==================== */
    .toast-container {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
      max-width: 380px;
    }
    .toast-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.5;
      pointer-events: auto;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
      animation: toastSlideIn 0.3s ease;
      opacity: 1;
      word-break: break-word;
      transition: opacity 0.25s ease, transform 0.25s ease;
    }
    .toast-item.removing {
      opacity: 0;
      transform: translateX(40px);
    }
    .toast-item.error   { background: #4a1a1a; color: #fca5a5; border-left: 3px solid #ef4444; }
    .toast-item.success { background: #1a3a1a; color: #86efac; border-left: 3px solid #22c55e; }
    .toast-item.info    { background: #1a2a4a; color: #93c5fd; border-left: 3px solid #3b82f6; }
    .toast-item.warning { background: #3a2a0a; color: #fde68a; border-left: 3px solid #f59e0b; }
    .toast-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
    .toast-msg { flex: 1; min-width: 0; }
    .toast-close {
      background: none; border: none; color: inherit;
      cursor: pointer; font-size: 16px; line-height: 1;
      padding: 0 2px; opacity: 0.5; flex-shrink: 0;
    }
    .toast-close:hover { opacity: 1; }
    @keyframes toastSlideIn {
      0% { opacity: 0; transform: translateX(40px); }
      100% { opacity: 1; transform: translateX(0); }
    }
    /* ==================== 全局 Spinner ==================== */
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    .spinner-sm { width: 18px; height: 18px; border-width: 2px; }
    .spinner-lg { width: 48px; height: 48px; border-width: 4px; }
    /* ==================== Skeleton 骨架屏 ==================== */
    .skeleton {
      background: linear-gradient(90deg, var(--bg-card) 25%, rgba(233,69,96,0.08) 50%, var(--bg-card) 75%);
      background-size: 200% 100%;
      animation: skeletonShimmer 1.5s ease-in-out infinite;
      border-radius: 4px;
    }
    @keyframes skeletonShimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .skeleton-line {
      height: 14px; margin-bottom: 8px; border-radius: 4px;
    }
    .skeleton-line:last-child { width: 60%; }
    /* ==================== 加载覆盖层 ==================== */
    .loading-overlay {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 40px;
      color: var(--text-secondary);
      font-size: 14px;
      flex: 1;
    }
    .loading-overlay .spinner { margin-bottom: 4px; }
    /* 面板抽屉头部（默认隐藏，移动端显示） */
    .conv-drawer-header, .settings-drawer-header { display: none; }
    /* 面板遮罩层（默认隐藏，移动端显示） */
    .panel-backdrop { display: none; }
    @media (max-width: 768px) {
      body { flex-direction: column; }

      .main { height: 100vh; min-height: 60vh; }

      /* 桌面端 toggle 按钮始终显示（移动端用来打开抽屉） */
      .panel-toggle { display: inline-flex; align-items: center; justify-content: center; }

      /* === 会话面板 — 左侧抽屉 === */
      .conv-panel {
        position: fixed;
        top: 0; left: 0;
        width: 280px;
        max-width: 85vw;
        height: 100vh;
        height: 100dvh;
        z-index: 100;
        transform: translateX(-100%);
        transition: transform 0.28s ease;
        border-right: 1px solid var(--border);
        box-shadow: 4px 0 24px rgba(0,0,0,0.4);
      }
      .conv-panel.open { transform: translateX(0); }
      /* 覆盖 collapsed 的桌面行为：移动端始终用抽屉方式 */
      .conv-panel.collapsed { width: 280px; max-width: 85vw; transform: translateX(-100%); }

      /* 抽屉头部（会话面板） */
      .conv-drawer-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }
      .conv-drawer-header span { font-size: 13px; font-weight: 600; color: var(--text-primary); }
      .conv-drawer-close {
        background: none; border: none;
        color: var(--text-secondary); font-size: 20px;
        cursor: pointer; padding: 2px 6px; border-radius: 4px;
        line-height: 1;
      }
      .conv-drawer-close:hover { background: rgba(233,69,96,0.12); color: var(--accent); }

      /* === 设置面板 — 右侧抽屉 === */
      .settings-panel {
        position: fixed;
        top: 0; right: 0;
        width: 280px;
        max-width: 85vw;
        height: 100vh;
        height: 100dvh;
        z-index: 100;
        transform: translateX(100%);
        transition: transform 0.28s ease;
        border-left: 1px solid var(--border);
        box-shadow: -4px 0 24px rgba(0,0,0,0.4);
        padding: 0;
        overflow-y: auto;
      }
      .settings-panel.open { transform: translateX(0); }
      .settings-panel.collapsed { width: 280px; max-width: 85vw; transform: translateX(100%); }

      /* 抽屉头部（设置面板） */
      .settings-drawer-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }
      .settings-drawer-header span { font-size: 13px; font-weight: 600; color: var(--text-primary); }
      .settings-drawer-close {
        background: none; border: none;
        color: var(--text-secondary); font-size: 20px;
        cursor: pointer; padding: 2px 6px; border-radius: 4px;
        line-height: 1;
      }
      .settings-drawer-close:hover { background: rgba(233,69,96,0.12); color: var(--accent); }

      /* 设置面板内容需要 padding（已在头部外面） */
      .settings-panel > :not(.settings-drawer-header) {
        padding-left: 16px;
        padding-right: 16px;
      }
      .settings-panel > h2:first-of-type { padding-top: 12px; }
      .settings-panel > .hint { padding-bottom: 16px; }

      /* === 面板遮罩层 === */
      .panel-backdrop {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.55);
        z-index: 99;
        opacity: 0;
        transition: opacity 0.3s ease;
      }
      .panel-backdrop.show { display: block; opacity: 1; }

      /* 显示目录树切换按钮 */
      .tree-toggle-btn { display: inline-flex; align-items: center; justify-content: center; }

      /* 抽屉式目录树 */
      .file-tree {
        position: fixed;
        top: 0; left: 0;
        width: 280px;
        max-width: 85vw;
        height: 100vh;
        height: 100dvh;
        min-width: auto;
        max-width: 300px;
        z-index: 100;
        transform: translateX(-100%);
        transition: transform 0.28s ease;
        border-right: 1px solid var(--border);
        box-shadow: 4px 0 24px rgba(0,0,0,0.4);
      }
      .file-tree.open { transform: translateX(0); }
      .tree-drawer-header { display: flex; }

      /* 隐藏 resize handle */
      .resize-handle { display: none !important; }

      /* 查看器全宽 */
      .file-viewer { width: 100%; }

      /* Tab 导航紧凑化 */
      .tab-bar { padding: 0 12px; overflow-x: auto; }
      .tab-btn { padding: 10px 14px; font-size: 13px; }

      /* 面包屑可横向滚动 */
      .breadcrumb { padding: 6px 12px; gap: 1px; }

      /* 目录树条目触控友好 */
      .tree-item { padding: 8px 12px 8px 0; font-size: 14px; min-height: 40px; }
      .tree-toggle { width: 28px; min-width: 28px; height: 32px; font-size: 12px; }
      .tree-icon { width: 24px; min-width: 24px; font-size: 16px; }
      .file-tree-header { font-size: 12px; padding: 10px 16px; }

      /* 查看器头部紧凑化 */
      .viewer-header { padding: 8px 12px; }
      .viewer-header .file-name { font-size: 12px; }
    }
    /* ==================== 编辑模式 (Phase 2) ==================== */
    .viewer-toolbar {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .viewer-toolbar button, .tree-toolbar-btn {
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text-primary);
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .viewer-toolbar button:hover, .tree-toolbar-btn:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }
    .viewer-toolbar .btn-save { background: var(--accent); color: white; border-color: var(--accent); }
    .viewer-toolbar .btn-save:hover { background: var(--accent-hover); }
    .viewer-toolbar .btn-cancel { color: var(--text-secondary); }
    .viewer-toolbar .btn-cancel:hover { color: white; }
    .edit-textarea {
      flex: 1;
      min-height: 100%;
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: 0;
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.5;
      resize: none;
      outline: none;
      tab-size: 4;
    }
    .edit-textarea:focus {
      box-shadow: inset 0 0 0 2px var(--accent);
    }
    .edit-status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 16px;
      background: var(--bg-card);
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-secondary);
      flex-shrink: 0;
    }
    .edit-status-bar .dirty-indicator {
      color: var(--accent);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .dirty-indicator.hidden { visibility: hidden; }
    /* ==================== 确认对话框 ==================== */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 1;
      transition: opacity 0.2s;
    }
    .modal-backdrop.hidden { display: none; opacity: 0; }
    .modal-dialog {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .modal-dialog h3 {
      font-size: 16px;
      margin: 0 0 12px 0;
      color: var(--text-primary);
    }
    .modal-dialog p {
      font-size: 14px;
      color: var(--text-secondary);
      margin: 0 0 20px 0;
      line-height: 1.5;
    }
    .modal-buttons {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }
    .modal-buttons button {
      padding: 8px 18px;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .modal-buttons .btn-primary { background: var(--accent); color: white; border-color: var(--accent); }
    .modal-buttons .btn-primary:hover { background: var(--accent-hover); }
    .modal-buttons .btn-secondary { background: var(--bg); color: var(--text-primary); }
    .modal-buttons .btn-secondary:hover { background: var(--border); }
    .modal-buttons .btn-danger { background: transparent; color: var(--accent); border-color: var(--accent); }
    .modal-buttons .btn-danger:hover { background: rgba(233,69,96,0.12); }
    /* ==================== 文件选择器弹窗 ==================== */
    .file-picker-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 2001;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 1;
      transition: opacity 0.2s;
    }
    .file-picker-backdrop.hidden { display: none; opacity: 0; }
    .file-picker-dialog {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0;
      max-width: 520px;
      width: 90%;
      max-height: 70vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .file-picker-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 24px 12px;
      border-bottom: 1px solid var(--border);
    }
    .file-picker-header h3 {
      font-size: 16px;
      margin: 0;
      color: var(--text-primary);
    }
    .file-picker-header .close-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 20px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background 0.15s;
    }
    .file-picker-header .close-btn:hover { background: var(--border); }
    .file-picker-search {
      padding: 10px 24px 8px;
      border-bottom: 1px solid var(--border);
    }
    .file-picker-search input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text-primary);
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
      box-sizing: border-box;
    }
    .file-picker-search input:focus {
      border-color: var(--accent);
    }
    .file-picker-search input::placeholder {
      color: var(--text-secondary);
    }
    .file-picker-body {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
      min-height: 200px;
      max-height: 50vh;
    }
    .file-picker-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 24px;
      cursor: pointer;
      transition: background 0.15s;
      border-bottom: 1px solid var(--border);
    }
    .file-picker-item:last-child { border-bottom: none; }
    .file-picker-item:hover { background: var(--bg); }
    .file-picker-item.selected { background: rgba(108, 92, 231, 0.1); }
    .file-picker-item .fp-checkbox {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
      color: transparent;
      font-size: 12px;
      font-weight: 700;
    }
    .file-picker-item.selected .fp-checkbox {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }
    .file-picker-item .fp-icon { font-size: 20px; flex-shrink: 0; }
    .file-picker-item .fp-info { flex: 1; min-width: 0; }
    .file-picker-item .fp-name {
      font-size: 14px;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .file-picker-item .fp-meta {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 2px;
    }
    .file-picker-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 24px 20px;
      border-top: 1px solid var(--border);
      gap: 10px;
    }
    .file-picker-footer .selected-count {
      font-size: 13px;
      color: var(--text-secondary);
    }
    .file-picker-footer button {
      padding: 8px 18px;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .file-picker-footer .btn-primary { background: var(--accent); color: white; border-color: var(--accent); }
    .file-picker-footer .btn-primary:hover { background: var(--accent-hover); }
    .file-picker-footer .btn-secondary { background: var(--bg); color: var(--text-primary); }
    .file-picker-footer .btn-secondary:hover { background: var(--border); }
    .file-picker-loading, .file-picker-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      color: var(--text-secondary);
    }
    .file-picker-loading .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-bottom: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    /* ==================== 会话列表 ==================== */
    .conv-section {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }
    .conv-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      padding: 0 4px;
    }
    .conv-header h3 {
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
      margin: 0;
    }
    .btn-new-conv {
      background: var(--accent);
      color: white;
      border: none;
      padding: 5px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .btn-new-conv:hover { background: var(--accent-hover); }
    .conv-groups {
      overflow-y: auto;
      flex: 1;
      min-height: 0;
    }
    .conv-group-label {
      font-size: 11px;
      color: var(--text-secondary);
      font-weight: 600;
      padding: 10px 4px 4px;
      letter-spacing: 0.5px;
      position: sticky;
      top: 0;
      background: var(--bg-card);
      z-index: 1;
    }
    .conv-item {
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 2px;
    }
    .conv-item:hover { background: rgba(233, 69, 96, 0.08); }
    .conv-item.active { background: rgba(233, 69, 96, 0.16); }
    .conv-item-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
    }
    .conv-item.active .conv-item-title { color: var(--accent); }
    .conv-item-meta {
      font-size: 11px;
      color: var(--text-secondary);
      display: flex;
      justify-content: space-between;
    }
    .conv-empty {
      text-align: center;
      color: var(--text-secondary);
      font-size: 12px;
      padding: 24px 16px;
      line-height: 1.5;
    }
    /* ==================== 目录树工具栏 ==================== */
    .tree-toolbar {
      display: flex;
      gap: 4px;
      padding: 6px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .tree-toolbar-btn {
      padding: 4px 8px;
      font-size: 11px;
      display: flex;
      align-items: center;
      gap: 3px;
      white-space: nowrap;
    }
    .tree-toolbar-btn .icon { font-size: 13px; }
    /* ==================== 会话右键菜单 ==================== */
    .conv-context-menu {
      position: fixed;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.55);
      z-index: 3000;
      min-width: 130px;
      opacity: 0;
      transform: scale(0.92);
      transition: opacity 0.12s, transform 0.12s;
      pointer-events: none;
    }
    .conv-context-menu.show {
      opacity: 1;
      transform: scale(1);
      pointer-events: auto;
    }
    .conv-context-menu-item {
      padding: 9px 16px;
      font-size: 13px;
      cursor: pointer;
      border-radius: 6px;
      color: var(--text-primary);
      transition: background 0.12s;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }
    .conv-context-menu-item:hover { background: rgba(233,69,96,0.12); }
    .conv-context-menu-item.danger { color: var(--accent); }
    .conv-context-menu-item.danger:hover { background: rgba(233,69,96,0.2); }

<body>
  <!-- 左栏 — 会话列表 -->
  <div class="conv-panel" id="convPanel">
    <div class="conv-drawer-header">
      <span>📋 会话</span>
      <button class="conv-drawer-close" onclick="togglePanelLeft()" aria-label="关闭">×</button>
    </div>
    <div class="conv-section">
      <div class="conv-header">
        <h3>📋 会话</h3>
        <button class="btn-new-conv" onclick="newConversation()">+ 新建</button>
      </div>
      <div class="conv-groups" id="convGroups">
        <div class="conv-empty">暂未连接，<br>连接后将显示会话列表</div>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="chat-header">
      <button class="panel-toggle" id="toggleConvPanel" onclick="togglePanelLeft()" title="切换会话列表">☰</button>
      <h1>AI Chat</h1>
      <span class="model-badge" id="modelBadge">DeepSeek V4 Pro</span>
      <button class="panel-toggle" id="toggleSettingsPanel" onclick="togglePanelRight()" title="切换设置面板">⚙️</button>
    </div>
    <div class="tab-bar" id="tabBar">
      <button class="tab-btn active" data-tab="chat" onclick="switchTab('chat')">💬 聊天</button>
      <button class="tab-btn" data-tab="files" onclick="switchTab('files')">📁 文件管理器</button>
      <button class="tab-btn" data-tab="daily" onclick="switchTab('daily')">📊 每日</button>
    </div>
    <div class="tab-content active" id="tab-chat">
      <div class="messages" id="messages">
        <div class="empty-state">
          <div class="icon">💬</div>
          <p>输入 Token 后点击连接</p>
        </div>
      </div>
      <div class="file-tags" id="fileTags"></div>
      <div class="input-area">
        <button class="attach-btn" id="attachBtn" title="选择文件" onclick="toggleFilePicker()">📎</button>
        <textarea id="input" placeholder="输入消息..." rows="1"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"
          oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,160)+'px';"
        ></textarea>
        <button id="sendBtn" onclick="sendMessage()" disabled>发送</button>
      </div>
    </div>
    <div class="tab-content" id="tab-files">
      <div class="breadcrumb" id="breadcrumb">
        <button class="tree-toggle-btn" onclick="toggleFileTree()" title="目录" aria-label="切换目录树">☰</button>
        <span class="breadcrumb-item root-icon current" data-path="" onclick="navigateBreadcrumb('')">🏠 /</span>
      </div>
      <div class="file-browser">
        <div class="tree-backdrop" id="treeBackdrop" onclick="toggleFileTree()"></div>
        <div class="panel-backdrop" id="panelBackdrop" onclick="closePanelDrawers()"></div>
        <div class="file-tree" id="fileTree">
          <div class="tree-drawer-header">
            <span>📂 目录</span>
            <button class="tree-drawer-close" onclick="toggleFileTree()" aria-label="关闭目录">×</button>
          </div>
          <div class="file-tree-header">📂 目录</div>
          <div class="tree-toolbar">
            <button class="tree-toolbar-btn" onclick="promptNewFile()" title="新建文件"><span class="icon">📄</span> 新建文件</button>
            <button class="tree-toolbar-btn" onclick="promptNewFolder()" title="新建文件夹"><span class="icon">📁</span> 新建文件夹</button>
          </div>
          <div class="upload-dropzone" id="uploadDropzone">
