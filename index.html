  <script>
    let connected = false;
    let apiUrl = '';
    let token = '';
    let agentId = 'assistant';

    window.onload = () => {
      const saved = JSON.parse(localStorage.getItem('aichat_config') || '{}');
      if (saved.apiUrl) document.getElementById('apiUrl').value = saved.apiUrl;
      if (saved.token) document.getElementById('token').value = saved.token;
      if (saved.agentId) document.getElementById('agentId').value = saved.agentId;

      // 恢复面板折叠状态（仅桌面端）
      if (!isMobileView()) {
        const panelState = JSON.parse(localStorage.getItem('aichat_panels') || '{}');
        if (panelState.convCollapsed) togglePanelLeft(false);
        if (panelState.settingsCollapsed) togglePanelRight(false);
      }
    };

    function switchTab(tabName) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelector(`.tab-btn[data-tab="${tabName}"]`).classList.add('active');
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.getElementById('tab-' + tabName).classList.add('active');
    }

    /* ==================== 面板折叠/展开（桌面） / 抽屉切换（移动端） ==================== */

    /** 当前是否为移动端视口 */
    function isMobileView() { return window.innerWidth <= 768; }

    function togglePanelLeft(save = true) {
      const panel = document.getElementById('convPanel');
      const btn = document.getElementById('toggleConvPanel');

      if (isMobileView()) {
        // 移动端：抽屉模式
        const isOpen = panel.classList.contains('open');
        if (isOpen) {
          closePanelDrawers();
          return;
        }
        // 关闭另一个抽屉
        closeSettingsDrawer();
        // 打开会话抽屉
        panel.classList.add('open');
        panel.classList.remove('collapsed');
        document.getElementById('panelBackdrop').classList.add('show');
        btn.classList.add('active');
      } else {
        // 桌面端：侧栏折叠模式
        panel.classList.toggle('collapsed');
        btn.classList.toggle('active', !panel.classList.contains('collapsed'));
        if (save) savePanelState();
      }
    }

    function togglePanelRight(save = true) {
      const panel = document.getElementById('settingsPanel');
      const btn = document.getElementById('toggleSettingsPanel');

      if (isMobileView()) {
        // 移动端：抽屉模式
        const isOpen = panel.classList.contains('open');
        if (isOpen) {
          closePanelDrawers();
          return;
        }
        // 关闭另一个抽屉
        closeConvDrawer();
        // 打开设置抽屉
        panel.classList.add('open');
        panel.classList.remove('collapsed');
        document.getElementById('panelBackdrop').classList.add('show');
        btn.classList.add('active');
      } else {
        // 桌面端：侧栏折叠模式
        panel.classList.toggle('collapsed');
        btn.classList.toggle('active', !panel.classList.contains('collapsed'));
        if (save) savePanelState();
      }
    }

    /** 关闭所有面板抽屉 + 遮罩 */
    function closePanelDrawers() {
      const convPanel = document.getElementById('convPanel');
      const settingsPanel = document.getElementById('settingsPanel');
      const backdrop = document.getElementById('panelBackdrop');
      const convBtn = document.getElementById('toggleConvPanel');
      const settingsBtn = document.getElementById('toggleSettingsPanel');

      convPanel.classList.remove('open');
      settingsPanel.classList.remove('open');
      if (backdrop) backdrop.classList.remove('show');
      if (convBtn) convBtn.classList.remove('active');
      if (settingsBtn) settingsBtn.classList.remove('active');
    }

    function closeConvDrawer() {
      const panel = document.getElementById('convPanel');
      panel.classList.remove('open');
      document.getElementById('toggleConvPanel').classList.remove('active');
    }

    function closeSettingsDrawer() {
      const panel = document.getElementById('settingsPanel');
      panel.classList.remove('open');
      document.getElementById('toggleSettingsPanel').classList.remove('active');
    }

    function savePanelState() {
      if (isMobileView()) return; // 移动端不持久化
      const convCollapsed = document.getElementById('convPanel').classList.contains('collapsed');
      const settingsCollapsed = document.getElementById('settingsPanel').classList.contains('collapsed');
      localStorage.setItem('aichat_panels', JSON.stringify({ convCollapsed, settingsCollapsed }));
    }

    // ==================== Toast 通知系统 ====================
    let toastIdCounter = 0;

    /**
     * 显示 Toast 通知
     * @param {string} msg - 消息内容
     * @param {'error'|'success'|'info'|'warning'} type - 类型
     * @param {number} duration - 停留时间（ms），默认 3500
     */
    function showToast(msg, type = 'info', duration = 3500) {
      const container = document.getElementById('toastContainer');
      if (!container) return;

      const icons = { error: '❌', success: '✅', info: 'ℹ️', warning: '⚠️' };
      const id = ++toastIdCounter;
      const item = document.createElement('div');
      item.className = 'toast-item ' + type;
      item.id = 'toast-' + id;
      item.innerHTML = `
        <span class="toast-icon">${icons[type] || 'ℹ️'}</span>
        <span class="toast-msg">${escapeHtmlSafe(msg)}</span>
        <button class="toast-close" onclick="dismissToast(${id})" title="关闭">×</button>
      `;
      container.appendChild(item);

      setTimeout(() => { dismissToast(id); }, duration);
    }

    function dismissToast(id) {
      const item = document.getElementById('toast-' + id);
      if (item && !item.classList.contains('removing')) {
        item.classList.add('removing');
        item.addEventListener('transitionend', () => item.remove(), { once: true });
        // 兜底：0.5s 后强制移除
        setTimeout(() => { if (item.parentNode) item.remove(); }, 350);
      }
    }

    function setStatus(ok, text) {
      const dot = document.getElementById('statusDot');
      const st = document.getElementById('statusText');
      if (ok) {
        dot.classList.add('connected');
        st.textContent = text;
      } else {
        dot.classList.remove('connected');
        st.textContent = text || '未连接';
      }
    }

    /** 创建内联加载指示器：spinner + 文字 */
    function createInlineLoading(text, size) {
      size = size || 'sm';
      const div = document.createElement('div');
      div.className = 'tree-item';
      div.style.cssText = 'display:flex;align-items:center;gap:10px;padding:8px 12px;color:var(--text-secondary);font-size:13px;';
      div.innerHTML = '<div class="spinner spinner-' + size + '"></div><span>' + escapeHtmlSafe(text) + '</span>';
      return div;
    }

    async function connect() {
      apiUrl = document.getElementById('apiUrl').value.trim().replace(/\/$/, '');
      token = document.getElementById('token').value.trim();
      agentId = document.getElementById('agentId').value;
      if (!apiUrl || !token) { showToast('请填写 API 地址和 Token', 'warning'); return; }
      setStatus(false, '连接中...');
      try {
        const resp = await fetch(apiUrl + '/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token,
          },
          body: JSON.stringify({
            model: 'openclaw:' + agentId,
            messages: [{ role: 'user', content: '你好' }],
            max_tokens: 10,
          }),
        });
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        connected = true;
        setStatus(true, '已连接');
        document.getElementById('sendBtn').disabled = false;
        document.getElementById('modelBadge').textContent = 'DeepSeek V4 Pro (' + agentId + ')';
        const msgs = document.getElementById('messages');
        if (msgs.querySelector('.empty-state')) msgs.innerHTML = '';
        addMessage('assistant', '连接成功！有什么我可以帮助你的？', new Date().toISOString());
        localStorage.setItem('aichat_config', JSON.stringify({ apiUrl, token, agentId }));
        loadConversations();
        showToast('连接成功', 'success');
      } catch (e) {
        connected = false;
        setStatus(false, '连接失败');
        showToast('连接失败: ' + e.message, 'error');
      }
    }

    /**
     * 格式化消息时间：今天显示 HH:MM，昨天显示「昨天 HH:MM」，更早显示 MM/DD HH:MM
     */
    function formatMessageTime(isoString) {
      if (!isoString) return '';
      const date = new Date(isoString);
      if (isNaN(date.getTime())) return '';
      const now = new Date();
      const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const yesterdayStart = new Date(todayStart.getTime() - 86400000);
      const hh = String(date.getHours()).padStart(2, '0');
      const mm = String(date.getMinutes()).padStart(2, '0');
      const timeStr = hh + ':' + mm;
      if (date >= todayStart) return timeStr;
      if (date >= yesterdayStart) return '昨天 ' + timeStr;
      const md = String(date.getMonth() + 1).padStart(2, '0') + '/' + String(date.getDate()).padStart(2, '0');
      return md + ' ' + timeStr;
    }

    /**
     * 从文件路径中提取文件名
     */
    function extractFileName(filePath) {
      if (!filePath) return '';
      const parts = filePath.replace(/\\/g, '/').split('/');
      return parts[parts.length - 1] || filePath;
    }

    /**
     * 渲染消息组件 — 支持 role 区分、时间戳、附件标签
     * @param {string|Object} roleOrMsg — 角色字符串 'user'|'assistant'，或完整消息对象 {role, content, time, files}
     * @param {string} [content] — 消息内容（role 为字符串时使用）
     * @param {string} [time] — ISO 时间戳（可选）
     * @param {string[]} [files] — 附件文件路径列表（可选）
     */
    function addMessage(roleOrMsg, content, time, files) {
      // 兼容两种调用方式：addMessage('user', 'hello') 或 addMessage({role, content, time, files})
      let role, msgContent, msgTime, msgFiles;
      if (typeof roleOrMsg === 'object' && roleOrMsg !== null) {
        role = roleOrMsg.role || 'user';
        msgContent = roleOrMsg.content || '';
        msgTime = roleOrMsg.time || '';
        msgFiles = roleOrMsg.files || [];
      } else {
        role = roleOrMsg;
        msgContent = content || '';
        msgTime = time || '';
        msgFiles = files || [];
      }

      const msgs = document.getElementById('messages');
      msgs.querySelector('.empty-state')?.remove();
      msgs.querySelector('.typing-indicator')?.parentElement?.remove();

      const div = document.createElement('div');
      div.className = 'message ' + role;

      // 消息头部：头像 + 角色名 + 时间戳
      const header = document.createElement('div');
      header.className = 'msg-header';

      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar';
      avatar.textContent = role === 'user' ? '👤' : '🤖';

      const roleLabel = document.createElement('div');
      roleLabel.className = 'role';
      roleLabel.textContent = role === 'user' ? '你' : 'AI';

      header.appendChild(avatar);
      header.appendChild(roleLabel);

      // 时间戳
      if (msgTime) {
        const timeEl = document.createElement('span');
        timeEl.className = 'msg-time';
        timeEl.textContent = formatMessageTime(msgTime);
        header.appendChild(timeEl);
      }

      div.appendChild(header);

      // 附件标签（如果有）
      if (msgFiles && msgFiles.length > 0) {
        const attDiv = document.createElement('div');
        attDiv.className = 'attachments';
        msgFiles.forEach(function(f) {
          const tag = document.createElement('span');
          tag.className = 'attachment-tag';
          const fname = extractFileName(f);
          tag.innerHTML = '<span class="att-icon">📎</span><span class="att-name" title="' + escapeHtml(f) + '">' + escapeHtml(fname) + '</span>';
          attDiv.appendChild(tag);
        });
        div.appendChild(attDiv);
      }

      // 消息正文
      const contentDiv = document.createElement('div');
      contentDiv.className = 'content';
      contentDiv.innerHTML = renderMarkdown(msgContent);
      div.appendChild(contentDiv);

      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
    }

    function renderMarkdown(text) {
      text = text.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
        '<pre><code>' + escapeHtml(code.trim()) + '</code></pre>');
      text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
      text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      text = text.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      text = text.replace(/^## (.+)$/gm, '<h2>$1</h2>');
      text = text.replace(/\n\n/g, '</p><p>');
      text = '<p>' + text.replace(/\n/g, '<br>') + '</p>';
      return text;
    }

    function escapeHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function showTyping() {
      const msgs = document.getElementById('messages');
      msgs.querySelector('.empty-state')?.remove();
      const div = document.createElement('div');
      div.className = 'message assistant';

      // 消息头部：头像 + 角色名
      const header = document.createElement('div');
      header.className = 'msg-header';

      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar';
      avatar.textContent = '🤖';

      const label = document.createElement('div');
      label.className = 'role';
      label.textContent = 'AI';

      header.appendChild(avatar);
      header.appendChild(label);
      div.appendChild(header);

      const indicator = document.createElement('div');
      indicator.className = 'typing-indicator';
      indicator.innerHTML = '<span></span><span></span><span></span>';
      div.appendChild(indicator);
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
      return div;
    }


    /**
     * 创建空的 assistant 消息容器（用于流式输出），返回 { container, content }
     */
    function createAssistantMessageElement() {
      const msgs = document.getElementById('messages');
      msgs.querySelector('.empty-state')?.remove();

      const div = document.createElement('div');
      div.className = 'message assistant';

      const header = document.createElement('div');
      header.className = 'msg-header';

      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar';
      avatar.textContent = '🤖';

      const roleLabel = document.createElement('div');
      roleLabel.className = 'role';
      roleLabel.textContent = 'AI';

      header.appendChild(avatar);
      header.appendChild(roleLabel);
      div.appendChild(header);

      const contentDiv = document.createElement('div');
      contentDiv.className = 'content';
      div.appendChild(contentDiv);

      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
      return { container: div, content: contentDiv };
    }

    /**
     * F28 — 文件选择按钮：切换文件选择器弹窗（弹窗实现见 F29）
     */
    /** 当前选中的文件列表 */
    let selectedFiles = [];
    /** 文件选择器中加载的完整文件列表（用于搜索过滤） */
    let filePickerAllFiles = [];
    let filePickerSource = 'chat'; // 'chat' or 'dashboard'

    /** 从 Dashboard 命令栏打开文件选择器 */
    function openDashboardFilePicker() {
      filePickerSource = 'dashboard';
      toggleFilePicker();
    }

    function toggleFilePicker() {
      const picker = document.getElementById('filePicker');
      if (!picker) return;
      const hidden = picker.classList.contains('hidden');
      if (hidden) {
        picker.classList.remove('hidden');
        loadFilePickerFiles();
      } else {
        picker.classList.add('hidden');
        filePickerSource = 'chat';
      }
    }

    function closeFilePicker() {
      const picker = document.getElementById('filePicker');
      if (picker) picker.classList.add('hidden');
      filePickerSource = 'chat';
      // 关闭时清空搜索框
      const searchInput = document.getElementById('filePickerSearch');
      if (searchInput) searchInput.value = '';
    }

    async function loadFilePickerFiles() {
      const body = document.getElementById('filePickerBody');
      body.innerHTML = '<div class="file-picker-loading"><div class="spinner"></div><span>加载中...</span></div>';
      const countEl = document.getElementById('filePickerCount');
      countEl.textContent = '已选 0 个文件';
      // 清空搜索框
      const searchInput = document.getElementById('filePickerSearch');
      if (searchInput) searchInput.value = '';
      try {
        const entries = await apiLs('/user-files');
        filePickerAllFiles = entries.filter(e => e.type === 'file');
        renderFilePickerItems(filePickerAllFiles);
      } catch (err) {
        body.innerHTML = '<div class="file-picker-empty"><span style="font-size:32px;">⚠️</span><p>加载失败: ' + escapeHtml(err.message) + '</p></div>';
      }
    }

    /** 渲染文件选择器列表（支持过滤） */
    function renderFilePickerItems(files) {
      const body = document.getElementById('filePickerBody');
      if (!body) return;
      if (files.length === 0) {
        body.innerHTML = '<div class="file-picker-empty"><span style="font-size:32px;">🔍</span><p>无匹配文件</p></div>';
        updateFilePickerCount();
        return;
      }
      let html = '';
      files.forEach((f, i) => {
        const filePath = '/user-files/' + f.name;
        const isSelected = selectedFiles.some(sf => sf.path === filePath);
        const icon = getFileIcon(f.name);
        const sizeStr = f.size ? formatFileSize(f.size) : '';
        html += `<div class="file-picker-item${isSelected ? ' selected' : ''}" onclick="toggleFilePickerItem(this)" data-path="/user-files/${escapeHtmlAttr(f.name)}" data-name="${escapeHtmlAttr(f.name)}">
          <div class="fp-checkbox">✓</div>
          <span class="fp-icon">${icon}</span>
          <div class="fp-info">
            <div class="fp-name">${escapeHtml(f.name)}</div>
            <div class="fp-meta">${sizeStr}</div>
          </div>
        </div>`;
      });
      body.innerHTML = html;
      updateFilePickerCount();
    }

    /** F31 — 文件选择器搜索/过滤（按文件名筛选） */
    function filterFilePickerFiles() {
      const input = document.getElementById('filePickerSearch');
      if (!input) return;
      const query = input.value.trim().toLowerCase();
      if (!query) {
        renderFilePickerItems(filePickerAllFiles);
        return;
      }

      const visibleItems = document.querySelectorAll('#filePickerBody .file-picker-item');

    async function sendMessage() {
      if (!connected) return;
      const input = document.getElementById('input');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      input.style.height = 'auto';
      const now = new Date().toISOString();
      addMessage('user', text, now);
      const sendBtn = document.getElementById('sendBtn');
      sendBtn.disabled = true;
      const { container: msgDiv, content: contentDiv } = createAssistantMessageElement();
      let fullContent = '';
      const replyTime = new Date().toISOString();
      try {
        const resp = await fetch(apiUrl + '/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token,
          },
          body: JSON.stringify({
            model: 'openclaw:' + agentId,
            messages: [{ role: 'user', content: text }],
            stream: true,
          }),
        });
        if (!resp.ok) {
          const errText = await resp.text();
          contentDiv.innerHTML = '<span class="error-msg">错误 HTTP ' + resp.status + ': ' + escapeHtml(errText) + '</span>';
          sendBtn.disabled = false;
          document.getElementById('input').focus();
          return;
        }
        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();
          for (const line of lines) {
            const trimmed = line.trim();
            if (!trimmed || !trimmed.startsWith('data:')) continue;
            const data = trimmed.slice(5).trim();
            if (data === '[DONE]') continue;
            try {
              const json = JSON.parse(data);
              const delta = json.choices?.[0]?.delta?.content;
              if (delta) {
                fullContent += delta;
                contentDiv.innerHTML = renderMarkdown(fullContent);
              }
            } catch (e) {
              // skip unparseable SSE lines
            }
          }
          document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }
        if (!fullContent) {
          contentDiv.innerHTML = '(no response)';
        }
        const header = msgDiv.querySelector('.msg-header');
        if (header) {
          const timeEl = document.createElement('span');
          timeEl.className = 'msg-time';
          timeEl.textContent = formatMessageTime(replyTime);
          header.appendChild(timeEl);
        }
      } catch (e) {
        if (!fullContent) {
          contentDiv.innerHTML = '<span class="error-msg">网络错误: ' + escapeHtml(e.message) + '</span>';
        }
        console.error('sendMessage stream error:', e);
      }
      sendBtn.disabled = false;
      document.getElementById('input').focus();
    }

    /**
     * 按时间分组：今天 / 昨天 / 更早（日期）
     */
    function timeGroupLabel(isoString) {
      const date = new Date(isoString);
      const now = new Date();
      const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const yesterdayStart = new Date(todayStart.getTime() - 86400000);
      const itemDay = new Date(date.getFullYear(), date.getMonth(), date.getDate());

      if (itemDay.getTime() === todayStart.getTime()) return '今天';
      if (itemDay.getTime() === yesterdayStart.getTime()) return '昨天';
      const mm = String(date.getMonth() + 1).padStart(2, '0');
      const dd = String(date.getDate()).padStart(2, '0');
      return mm + '/' + dd;
    }

    /**
     * 格式化对话时间：HH:MM
     */
    function formatConvTime(isoString) {
      const date = new Date(isoString);
      const hh = String(date.getHours()).padStart(2, '0');
      const mm = String(date.getMinutes()).padStart(2, '0');
      return hh + ':' + mm;
    }

    /**
     * 渲染会话列表，按时间分组
     * @param {Array} sessions — [{ id, title, created, updated, msgCount }]
     */
    function renderConversationList(sessions) {
      const container = document.getElementById('convGroups');
      if (!container) return;

      if (!sessions || sessions.length === 0) {
        container.innerHTML = '<div class="conv-empty">暂无会话，<br>点击「+ 新建」开始</div>';
        return;
      }

      // 按时间分组
      const now = new Date();
      const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const yesterdayStart = new Date(todayStart.getTime() - 86400000);

      const groups = { '今天': [], '昨天': [], '更早': [] };
      sessions.forEach(s => {
        const d = new Date(s.updated || s.created);
        if (d >= todayStart) {
          groups['今天'].push(s);
        } else if (d >= yesterdayStart) {
          groups['昨天'].push(s);
        } else {
          groups['更早'].push(s);
        }
      });

      let html = '';
      ['今天', '昨天', '更早'].forEach(label => {
        if (groups[label].length === 0) return;
        html += '<div class="conv-group-label">' + label + '</div>';
        groups[label].forEach(s => {
          const cls = (s.id === activeConversationId) ? ' conv-item active' : 'conv-item';
          html +=
            '<div class="' + cls + '" onclick="selectConversation(\'' + s.id + '\')" data-sid="' + s.id + '">' +
              '<div class="conv-item-title">' + escapeHtmlSafe(s.title || '新会话') + '</div>' +
              '<div class="conv-item-meta">' +
                '<span>' + (s.msgCount || 0) + ' 条消息</span>' +
                '<span>' + formatConvTime(s.updated || s.created) + '</span>' +
              '</div>' +
            '</div>';
        });
      });

      container.innerHTML = html;
    }

      const menu = document.getElementById('convContextMenu');

      // 调整菜单位置确保不超出视口
      let x = event.clientX || event.touches?.[0]?.clientX || 0;
      let y = event.clientY || event.touches?.[0]?.clientY || 0;

      // 先显示才能测量尺寸
      menu.classList.add('show');

      requestAnimationFrame(() => {
        const rect = menu.getBoundingClientRect();
        if (x + rect.width > window.innerWidth - 8) x = window.innerWidth - rect.width - 8;
        if (y + rect.height > window.innerHeight - 8) y = window.innerHeight - rect.height - 8;
        if (x < 4) x = 4;
        if (y < 4) y = 4;
        menu.style.left = x + 'px';
        menu.style.top = y + 'px';
      });
    }

    (function setupConvEventDelegation() {
      const groups = document.getElementById('convGroups');
      if (!groups) return;

      // 右键事件
      groups.addEventListener('contextmenu', function(e) {
        const item = e.target.closest('.conv-item');

        const sid = item.dataset.sid;
        const title = item.querySelector('.conv-item-title')?.textContent || '新会话';

        const sid = item.dataset.sid;

      }, { passive: false });

      groups.addEventListener('touchend', function(e) {
        if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
        // 长按触发了菜单后，阻止紧随的 click（selectConversation）
        if (longPressTriggered) {
          e.preventDefault();
          e.stopPropagation();
        }
      });

      groups.addEventListener('touchmove', function(e) {
        if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
      });

      // 点击拦截：长按触发后，阻止一次 click
      groups.addEventListener('click', function(e) {
        if (longPressTriggered) {
          longPressTriggered = false;
          e.preventDefault();
          e.stopPropagation();
          return;
        }
      }, true);
    })();

    let currentUploadDir = '/';

    function setUploadDir(dirPath) {
      currentUploadDir = dirPath || '/';
      var dz = document.getElementById('uploadDropzone');
      if (dz) {
        var pathLabel = currentUploadDir === '/' ? '/' : currentUploadDir.replace(/^\//,'');
        dz.querySelector('.dz-icon').textContent = '📤';

        hint.textContent = '上传到: ' + pathLabel + '（最大 50MB）';
      }

    function uploadFileWithProgress(file, dirPath, overwrite) {
      return new Promise(function(resolve, reject) {
        var xhr = new XMLHttpRequest();
        var formData = new FormData();
        formData.append('file', file);
        formData.append('path', dirPath);
        if (overwrite) formData.append('overwrite', 'true');

        var progressEl = document.getElementById('uploadProgress');
        var filenameEl = document.getElementById('upFilename');
        var percentEl = document.getElementById('upPercent');
        var barEl = document.getElementById('upBarFill');

        progressEl.classList.add('show');
        filenameEl.textContent = file.name;
        percentEl.textContent = '0%';
        barEl.style.width = '0%';

        xhr.upload.addEventListener('progress', function(e) {
          if (e.lengthComputable) {
            var pct = Math.round((e.loaded / e.total) * 100);
            percentEl.textContent = pct + '%';
            barEl.style.width = pct + '%';
          }
        });

        xhr.addEventListener('load', function() {
          progressEl.classList.remove('show');
          if (xhr.status >= 200 && xhr.status < 300) {
            try {
              resolve(JSON.parse(xhr.responseText));
            } catch (e) {
              resolve({ ok: true });
            }
          } else if (xhr.status === 409) {
            reject({ conflict: true, message: '文件已存在', file: file, dirPath: dirPath });
          } else {
            var msg = 'HTTP ' + xhr.status;
            try { var body = JSON.parse(xhr.responseText); msg = body.message || msg; } catch(e) {}
            reject(new Error(msg));
          }
        });

        xhr.addEventListener('error', function() {
          progressEl.classList.remove('show');
          reject(new Error('网络错误'));
        });

        xhr.addEventListener('abort', function() {
          progressEl.classList.remove('show');
          reject(new Error('上传取消'));
        });

        var apiBase = (apiUrl || '') + '/v1/files/upload';
        xhr.open('POST', apiBase);
        xhr.setRequestHeader('Authorization', 'Bearer ' + (token || ''));
        xhr.send(formData);
      });
    }

    function setupUploadDropzone() {
      var dropzone = document.getElementById('uploadDropzone');
      if (!dropzone) return;

      // 阻止浏览器默认拖入行为
      ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(function(evt) {
        document.body.addEventListener(evt, function(e) { e.preventDefault(); e.stopPropagation(); });
      });

      dropzone.addEventListener('dragover', function(e) {
        e.preventDefault(); e.stopPropagation();
        dropzone.classList.add('drag-over');
      });
      dropzone.addEventListener('dragleave', function(e) {
        e.preventDefault(); e.stopPropagation();
        dropzone.classList.remove('drag-over');
      });
      dropzone.addEventListener('drop', function(e) {
        e.preventDefault(); e.stopPropagation();
        dropzone.classList.remove('drag-over');

        var files = e.dataTransfer.files;
        if (!files || files.length === 0) return;
        handleUploadFiles(files);
      });

      // 点击也触发文件选择
      dropzone.addEventListener('click', function() {
        var input = document.createElement('input');
        input.type = 'file';
        input.multiple = true;
        input.addEventListener('change', function() {
          if (input.files.length > 0) handleUploadFiles(input.files);
        });
        input.click();
      });
    }

    async function handleUploadFiles(files) {
      var dirPath = currentUploadDir || '/';

      for (var i = 0; i < files.length; i++) {
        var file = files[i];
        if (file.size > 50 * 1024 * 1024) {
          showToast(file.name + ' 超过 50MB 限制，已跳过', 'error');
          continue;
        }
        try {
          var result = await uploadFileWithProgress(file, dirPath, false);
          showToast(file.name + ' 上传成功 ✅', 'success');
        } catch (err) {
          if (err.conflict) {
            // 文件冲突：弹确认框
            var overwrite = await showConfirm(
              '覆盖文件？',
              '文件 ' + file.name + ' 已存在，是否覆盖？'
            );
            if (overwrite) {
              try {
                var retryResult = await uploadFileWithProgress(file, dirPath, true);
                showToast(file.name + ' 已覆盖 ✅', 'success');
              } catch (e2) {
                showToast(file.name + ' 覆盖失败: ' + e2.message, 'error');
                continue;
              }
            } else {
              showToast(file.name + ' 已跳过', 'warning');
              continue;
            }
          } else {
            showToast(file.name + ' 上传失败: ' + err.message, 'error');
            continue;
          }
        }
      }

      // 上传完成后刷新目录树
      await refreshCurrentDirectory();
    }

    // ==================== 文件树组件（API 对接） ====================

    function getFileIcon(filename) {
      const ext = filename.split('.').pop().toLowerCase();
      const icons = {
        'md': '📝', 'py': '🐍', 'js': '📜', 'json': '📋',
        'html': '🌐', 'css': '🎨', 'yml': '⚙️', 'yaml': '⚙️',
        'sh': '💻', 'service': '⚡', 'conf': '🔧', 'cfg': '🔧',
        'txt': '📄', 'log': '📋',
        'png': '🖼️', 'jpg': '🖼️', 'jpeg': '🖼️', 'gif': '🖼️', 'svg': '🖼️',
        'bmp': '🖼️', 'ico': '🖼️', 'webp': '🖼️',
      };
      return icons[ext] || '📄';
    }

    function getFolderIcon(name) {
      return name === 'memory' ? '🧠' : name === 'projects' ? '📦' :
             name === 'sops' ? '📋' : name === 'ac' ? '⚙️' :
             name === 'deploy' ? '🚀' : '📁';
    }

    let activeTreeItem = null;
    let fileTreeInitialized = false;

    function renderEntries(entries, container, level, parentPath) {
      container.innerHTML = '';
      if (!entries.length) {
        const empty = document.createElement('div');
        empty.className = 'tree-item';
        empty.style.cssText = 'padding-left:' + (12 + level * 16) + 'px;color:var(--text-secondary);font-size:12px;';
        empty.textContent = '(空)';
        container.appendChild(empty);
        return;
      }
      entries.forEach(entry => {
        const fullPath = parentPath + '/' + entry.name;
        const isDir = entry.type === 'directory';

        const row = document.createElement('div');
        row.className = 'tree-item';
        row.style.paddingLeft = (12 + level * 16) + 'px';
        row.dataset.path = fullPath;
        row.dataset.type = entry.type;
        row.dataset.name = entry.name;
        if (isDir) {
          row.dataset.expanded = 'false';
          row.dataset.loaded = 'false';
        }

        row.onclick = function(e) {
          if (e.target.classList.contains('tree-toggle')) {
            toggleApiFolder(this, fullPath, level);
            return;
          }
          selectTreeItem(this, entry, fullPath);
        };

        const toggle = document.createElement('span');
        toggle.className = 'tree-toggle' + (isDir ? '' : ' empty');
        toggle.textContent = isDir ? '▶' : '';

        const icon = document.createElement('span');
        icon.className = 'tree-icon';
        icon.textContent = isDir ? getFolderIcon(entry.name) : getFileIcon(entry.name);

        const name = document.createElement('span');
        name.className = 'tree-name';
        name.textContent = entry.name;

        row.appendChild(toggle);
        row.appendChild(icon);
        row.appendChild(name);
        container.appendChild(row);

        if (isDir) {
          const children = document.createElement('div');
          children.className = 'tree-children collapsed';
          children.dataset.path = fullPath;
          container.appendChild(children);
        }
      });
    }

    async function toggleApiFolder(row, fullPath, level) {
      const toggle = row.querySelector('.tree-toggle');
      if (!toggle || toggle.classList.contains('empty')) return;

      const children = row.nextElementSibling;
      if (!children || !children.classList.contains('tree-children')) return;

      const isExpanded = row.dataset.expanded === 'true';
      if (isExpanded) {
        children.classList.add('collapsed');
        toggle.classList.remove('expanded');
        row.dataset.expanded = 'false';
        return;
      }

      // Expand — show loading, then fetch if not loaded
      toggle.classList.add('expanded');
      row.dataset.expanded = 'true';
      children.classList.remove('collapsed');

      if (row.dataset.loaded !== 'true') {
        children.innerHTML = '';
        children.appendChild(createInlineLoading('加载中...'));
        children.firstChild.style.paddingLeft = (12 + (level+1) * 16) + 'px';
        try {
          const entries = await apiLs(fullPath);
          row.dataset.loaded = 'true';
          renderEntries(entries, children, level + 1, fullPath);
        } catch (err) {
          children.innerHTML = '<div class="tree-item" style="padding-left:' + (12 + (level+1) * 16) + 'px;color:var(--accent);">⚠️ ' + err.message + '</div>';
          showToast('目录加载失败: ' + err.message, 'error');
        }
      }
    }

    function selectTreeItem(row, entry, fullPath) {
      closeTreeOnMobile();
      if (activeTreeItem) {
        activeTreeItem.classList.remove('active');
      }
      row.classList.add('active');
      activeTreeItem = row;
      // Update breadcrumb
      if (entry.type === 'directory') {
        renderBreadcrumb(fullPath);
        resetViewerState();
        setUploadDir(fullPath);
        const viewer = document.getElementById('fileViewer');
        viewer.innerHTML = '<div class="placeholder"><div class="icon">📁</div><p>' + escapeHtmlSafe(fullPath) + '</p></div>';
      } else {
        const dirPath = fullPath.substring(0, fullPath.lastIndexOf('/'));
        renderBreadcrumb(dirPath);
        // 文件：先检查未保存修改
        if (checkUnsavedBeforeSwitch(function() {
          renderFileViewer(fullPath, entry.name);
        })) return;
        renderFileViewer(fullPath, entry.name);
      }
    }

    // ==================== 面包屑导航 ====================

    let currentBreadcrumbPath = '';

    function renderBreadcrumb(path) {
      currentBreadcrumbPath = path;
      const bc = document.getElementById('breadcrumb');
      bc.innerHTML = '';

      // Root / Home
      const rootItem = document.createElement('span');
      rootItem.className = 'breadcrumb-item root-icon' + (path === '' || path === '/' ? ' current' : '');
      rootItem.textContent = '🏠 /';
      rootItem.onclick = function() { navigateBreadcrumb(''); };
      bc.appendChild(rootItem);

      if (path === '' || path === '/') return;

      const parts = path.replace(/^\//, '').split('/');
      let cumulative = '';
      parts.forEach((part, i) => {
        cumulative += '/' + part;

        const sep = document.createElement('span');
        sep.className = 'breadcrumb-separator';
        sep.textContent = '›';
        bc.appendChild(sep);

        const item = document.createElement('span');
        item.className = 'breadcrumb-item' + (i === parts.length - 1 ? ' current' : '');
        item.textContent = part;
        item.onclick = function() { navigateBreadcrumb(cumulative); };
        bc.appendChild(item);
      });
    }

    function navigateBreadcrumb(path) {
      closeTreeOnMobile();
      // Check unsaved changes before navigating away
      if (checkUnsavedBeforeSwitch(function() { doNavigateBreadcrumb(path); })) return;
      doNavigateBreadcrumb(path);
    }

    function doNavigateBreadcrumb(path) {
      resetViewerState();
      renderBreadcrumb(path);
      setUploadDir(path);
      // Reset active item
      if (activeTreeItem) { activeTreeItem.classList.remove('active'); activeTreeItem = null; }
      // Show empty viewer
      const viewer = document.getElementById('fileViewer');
      viewer.innerHTML = `
        <div class="placeholder">
          <div class="icon">📁</div>
          <p>${escapeHtmlSafe(path || '/')}</p>
        </div>`;
      // Reload the file tree for this path
      const treeContent = document.getElementById('fileTreeContent');
      treeContent.innerHTML = '';
      treeContent.appendChild(createInlineLoading('加载目录...'));
      apiLs(path || '/').then(entries => {
        const container = document.createElement('div');
        renderEntries(entries, container, 0, path || '');
        treeContent.innerHTML = '';
        const items = container.querySelectorAll('.tree-item, .tree-children');
        items.forEach(el => treeContent.appendChild(el));
      }).catch(err => {
        treeContent.innerHTML = '<div class="tree-item" style="padding-left:12px;color:var(--accent);">⚠️ ' + err.message + '</div>';
        showToast('目录加载失败: ' + err.message, 'error');
      });
    }

    // ==================== 文件查看器（highlight.js 语法高亮） ====================

    function getLanguage(filename) {
      const ext = filename.split('.').pop().toLowerCase();
      const map = {
        'py': 'python', 'js': 'javascript', 'ts': 'typescript', 'jsx': 'javascript',
        'tsx': 'typescript', 'html': 'xml', 'css': 'css', 'scss': 'scss',
        'json': 'json', 'md': 'markdown', 'yaml': 'yaml', 'yml': 'yaml',
        'sh': 'bash', 'bash': 'bash', 'zsh': 'bash',
        'c': 'c', 'cpp': 'cpp', 'h': 'c', 'hpp': 'cpp',
        'java': 'java', 'go': 'go', 'rs': 'rust', 'rb': 'ruby',
        'php': 'php', 'sql': 'sql', 'xml': 'xml', 'toml': 'ini',
        'ini': 'ini', 'cfg': 'ini', 'conf': 'ini',
        'dockerfile': 'dockerfile', 'makefile': 'makefile',
        'txt': 'plaintext', 'log': 'plaintext',
        'service': 'ini',
      };
      return map[ext] || 'plaintext';
    }

    const MAX_PREVIEW_SIZE = 1024 * 1024; // 1MB 预览上限
    const BINARY_EXTS = new Set([
      'png', 'jpg', 'jpeg', 'gif', 'bmp', 'ico', 'webp', 'svgz',
      'mp3', 'mp4', 'avi', 'mov', 'mkv', 'wav', 'ogg', 'flac',
      'zip', 'tar', 'gz', 'bz2', 'xz', '7z', 'rar',
      'pdf', 'doc', 'docx', 'xls', 'xlsx', 'ppt', 'pptx',
      'exe', 'dll', 'so', 'a', 'o', 'class', 'wasm',
      'bin', 'dat', 'db', 'sqlite', 'sqlite3',
      'ttf', 'otf', 'woff', 'woff2', 'eot',
      'pyc', 'pyo', 'whl',
    ]);

    function isBinaryByExtension(filename) {
      const ext = filename.split('.').pop().toLowerCase();
      return BINARY_EXTS.has(ext);
    }

    const IMAGE_EXTS = new Set([
      'png', 'jpg', 'jpeg', 'gif', 'webp', 'svg', 'bmp', 'ico',
    ]);

    function isImageByExtension(filename) {
      const ext = filename.split('.').pop().toLowerCase();
      return IMAGE_EXTS.has(ext);
    }

    function isBinaryContent(text) {
      const sample = text.slice(0, 4096);
      if (sample.indexOf('\x00') >= 0) return true;
      let nonPrintable = 0;
      for (let i = 0; i < sample.length; i++) {
        const c = sample.charCodeAt(i);
        if (c < 0x20 && c !== 0x09 && c !== 0x0a && c !== 0x0d) nonPrintable++;
      }
      return nonPrintable / sample.length > 0.1;
    }

    function formatFileSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    async function apiRead(path) {
      const url = (apiUrl || '') + '/v1/files/read?path=' + encodeURIComponent(path);
      const resp = await fetch(url, {
        headers: { 'Authorization': 'Bearer ' + (token || '') }
      });
      if (!resp.ok) {
        if (resp.status === 404) throw new Error('文件不存在（404）');
        if (resp.status === 401) throw new Error('认证失败，请先连接');
        const body = await resp.text();
        let msg = 'HTTP ' + resp.status;
        try { msg = JSON.parse(body).message || msg; } catch(e) {}
        throw new Error(msg);
      }
      return await resp.text();
    }

    async function apiReadBlob(path) {
      const url = (apiUrl || '') + '/v1/files/read?path=' + encodeURIComponent(path);
      const resp = await fetch(url, {
        headers: { 'Authorization': 'Bearer ' + (token || '') }
      });
      if (!resp.ok) {
        if (resp.status === 404) throw new Error('文件不存在（404）');
        if (resp.status === 401) throw new Error('认证失败，请先连接');
        const body = await resp.text();
        let msg = 'HTTP ' + resp.status;
        try { msg = JSON.parse(body).message || msg; } catch(e) {}
        throw new Error(msg);
      }
      return await resp.blob();
    }

    function escapeHtmlSafe(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    /** 下载文件：通过 /v1/files/download 获取内容，触发浏览器下载 */
    async function downloadFile(filePath, filename) {
      try {
        showToast('下载中: ' + filename + '...', 'info', 2000);
        const url = (apiUrl || '') + '/v1/files/download?path=' + encodeURIComponent(filePath);
        const resp = await fetch(url, {
          headers: { 'Authorization': 'Bearer ' + (token || '') }
        });
        if (!resp.ok) {
          const body = await resp.text();
          let msg = 'HTTP ' + resp.status;
          try { msg = JSON.parse(body).message || msg; } catch(e) {}
          throw new Error(msg);
        }
        const blob = await resp.blob();
        const objectUrl = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = objectUrl;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(objectUrl);
        showToast(filename + ' 下载完成 ✅', 'success');
      } catch (err) {
        showToast('下载失败: ' + err.message, 'error');
      }
    }

    /** 创建 viewer-header HTML（含编辑按钮和下载按钮） */
    function viewerHeaderHtml(filename, lang, showEdit, fullPath) {
      var downloadBtn = '';
      if (fullPath) {
        downloadBtn = '<button class="viewer-toolbar-btn" onclick="downloadFile(\'' + escapeHtmlAttr(fullPath) + '\', \'' + escapeHtmlAttr(filename) + '\')" title="下载文件">📥 下载</button>';
      }
      return '<div class="viewer-header">' +
        '<span class="file-name"><span class="f-icon">' + getFileIcon(filename) + '</span>' + escapeHtmlSafe(filename) + '</span>' +
        '<span class="file-lang">' + lang + '</span>' +
        '<div class="viewer-toolbar">' +
          downloadBtn +
          (showEdit ? '<button class="btn-edit" onclick="enterEditMode()">✏️ 编辑</button>' : '') +
        '</div>' +
        '</div>';
    }

    function escapeHtmlAttr(str) {
      return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // ==================== Viewer State (Phase 2) ====================

    let viewerState = {
      path: '', filename: '', content: '', originalContent: '',
      isDirty: false, isEditing: false
    };

    /** Object URLs for image previews — cleaned up on navigation */
    let imgObjectUrls = {};

    function resetViewerState() {
      viewerState.path = ''; viewerState.filename = ''; viewerState.content = '';
      viewerState.originalContent = ''; viewerState.isDirty = false; viewerState.isEditing = false;
      // Revoke any active image object URLs
      Object.keys(imgObjectUrls).forEach(function(k) {
        URL.revokeObjectURL(imgObjectUrls[k]);
      });
      imgObjectUrls = {};
    }

    function setViewerContent(path, filename, content) {
      viewerState.path = path; viewerState.filename = filename;
      viewerState.content = content; viewerState.originalContent = content;
      viewerState.isDirty = false; viewerState.isEditing = false;
    }

    function markDirty() {
      if (!viewerState.isDirty) { viewerState.isDirty = true; updateDirtyIndicator(); }
    }

    function clearDirty() {
      viewerState.isDirty = false; viewerState.originalContent = viewerState.content;
      updateDirtyIndicator();
    }

    function updateDirtyIndicator() {
      const el = document.getElementById('dirtyIndicator');
      if (el) el.classList.toggle('hidden', !viewerState.isDirty || !viewerState.isEditing);
    }

    async function renderFileViewer(fullPath, filename, preloadedContent) {
      const viewer = document.getElementById('fileViewer');
      const lang = getLanguage(filename);
      const isMd = lang === 'markdown' || filename.toLowerCase().endsWith('.md');

      // Image file — fetch as blob and display <img>
      if (isImageByExtension(filename)) {
        viewer.innerHTML = viewerHeaderHtml(filename, 'image', false, fullPath) +
          '<div class="viewer-loading"><div class="spinner spinner-lg"></div><span>加载图片...</span></div>';

        try {
          const blob = await apiReadBlob(fullPath);
          const objectUrl = URL.createObjectURL(blob);
          viewer.innerHTML = viewerHeaderHtml(filename, 'image', false, fullPath) +
            '<div class="image-preview-container">' +
              '<img src="' + objectUrl + '" alt="' + escapeHtmlSafe(filename) + '" class="image-preview-img">' +
              '<div class="image-info">' + formatFileSize(blob.size) + '</div>' +
            '</div>';
          // Revoke object URL when navigating away or closing tab
          imgObjectUrls[fullPath] = objectUrl;
        } catch (err) {
          viewer.innerHTML = viewerHeaderHtml(filename, 'image', false, fullPath) +
            '<div class="viewer-error"><span style="font-size:32px;">⚠️</span><span>图片加载失败: ' + escapeHtmlSafe(err.message) + '</span></div>';
          showToast('图片加载失败: ' + err.message, 'error');
        }
        return;
      }

      // Binary file
      if (isBinaryByExtension(filename)) {
        resetViewerState();
        viewer.innerHTML = `
          <div class="viewer-header">
            <span class="file-name"><span class="f-icon">${getFileIcon(filename)}</span>${escapeHtmlSafe(filename)}</span>
            <span class="file-lang">binary</span>
            <div class="viewer-toolbar">
              <button class="viewer-toolbar-btn" onclick="downloadFile('${escapeHtmlAttr(fullPath)}', '${escapeHtmlAttr(filename)}')" title="下载文件">📥 下载</button>
            </div>
          </div>
          <div class="viewer-error">
            <span style="font-size:32px;">📦</span>
            <span>二进制文件，无法预览</span>
            <span style="font-size:12px;margin-top:4px;">（${escapeHtmlSafe(filename.split('.').pop().toUpperCase())} 格式不支持在线预览）</span>
          </div>`;
        return;
      }

      // If content preloaded (e.g. after edit), render directly
      if (preloadedContent !== undefined) {
        setViewerContent(fullPath, filename, preloadedContent);
        if (isMd) {
          renderMarkdownContent(viewer, filename, preloadedContent, fullPath, false);
        } else {
          renderCodeContent(viewer, filename, lang, preloadedContent, fullPath, false);
        }
        return;
      }

      // Loading state
      viewer.innerHTML = viewerHeaderHtml(filename, lang, false, fullPath) +
        '<div class="viewer-loading"><div class="spinner spinner-lg"></div><span>加载中...</span></div>';

      try {
        let content = await apiRead(fullPath);
        const originalSize = content.length;
        let truncated = false;
        if (content.length > MAX_PREVIEW_SIZE) {
          content = content.slice(0, MAX_PREVIEW_SIZE);
          truncated = true;
        }

        if (isBinaryContent(content)) {
          resetViewerState();
          viewer.innerHTML = `
            <div class="viewer-header">
              <span class="file-name"><span class="f-icon">${getFileIcon(filename)}</span>${escapeHtmlSafe(filename)}</span>
              <span class="file-lang">binary</span>
              <div class="viewer-toolbar">
                <button class="viewer-toolbar-btn" onclick="downloadFile('${escapeHtmlAttr(fullPath)}', '${escapeHtmlAttr(filename)}')" title="下载文件">📥 下载</button>
              </div>
            </div>
            <div class="viewer-error">
              <span style="font-size:32px;">📦</span>
              <span>检测到二进制内容，无法预览</span>
              <span style="font-size:12px;margin-top:4px;">（文件大小：${formatFileSize(originalSize)}）</span>
            </div>`;
          return;
        }

        setViewerContent(fullPath, filename, content);

        if (isMd) {
          renderMarkdownContent(viewer, filename, content, fullPath, truncated);
        } else {
          renderCodeContent(viewer, filename, lang, content, fullPath, truncated);
        }
      } catch (err) {
        resetViewerState();
        viewer.innerHTML = viewerHeaderHtml(filename, lang, false, fullPath) +
          '<div class="viewer-error"><span style="font-size:32px;">⚠️</span><span>' + escapeHtmlSafe(err.message) + '</span></div>';
        showToast('文件加载失败: ' + err.message, 'error');
      }
    }

    function renderMarkdownContent(viewer, filename, content, fullPath, truncated) {
      if (!window._markedConfigured) {
        marked.use({ breaks: true, gfm: true, langPrefix: 'hljs language-' });
        window._markedConfigured = true;
      }
      const mdHtml = marked.parse(content);
      const truncatedNotice = truncated
        ? '<div class="truncate-notice">⚠️ 文件过大（' + formatFileSize(viewerState.originalContent.length) + '），仅显示前 ' + formatFileSize(MAX_PREVIEW_SIZE) + ' 的内容</div>'
        : '';

      viewer.innerHTML = viewerHeaderHtml(filename, 'preview', true, fullPath) + truncatedNotice +
        '<div class="markdown-body">' + mdHtml + '</div>';

      viewer.querySelectorAll('.markdown-body pre code').forEach(block => {
        hljs.highlightElement(block);
      });
    }

    function renderCodeContent(viewer, filename, lang, content, fullPath, truncated) {
      let highlighted;
      if (lang === 'plaintext') {
        highlighted = escapeHtmlSafe(content);
      } else {
        const result = hljs.highlight(content, { language: lang });
        highlighted = result.value;
      }

      const lines = content.split('\n');
      const lineNumbers = lines.map((_, i) => '<span>' + (i + 1) + '</span>').join('');

      const truncatedNotice = truncated
        ? '<div class="truncate-notice">⚠️ 文件过大（' + formatFileSize(viewerState.originalContent.length) + '），仅显示前 ' + formatFileSize(MAX_PREVIEW_SIZE) + '（' + lines.length + ' 行）</div>'
        : '';

      viewer.innerHTML = viewerHeaderHtml(filename, lang, true, fullPath) + truncatedNotice +
        '<div class="viewer-body" id="viewerBodyMain" ondblclick="enterEditMode()">' +
          '<div class="code-with-lines">' +
            '<div class="line-numbers">' + lineNumbers + '</div>' +
            '<div class="code-content"><pre><code class="hljs language-' + lang + '" id="codeBlockMain">' + highlighted + '</code></pre></div>' +
          '</div>' +
        '</div>';
    }

    // ==================== Edit Mode (F10/F11/F12 — Phase 2) ====================

    function enterEditMode() {
      if (viewerState.isEditing) return;
      if (!viewerState.path || !viewerState.filename) return;

      viewerState.isEditing = true;
      const viewer = document.getElementById('fileViewer');

      // Rebuild header with Save/Cancel toolbar
      const headerDiv = document.createElement('div');
      headerDiv.className = 'viewer-header';
      headerDiv.innerHTML =
        '<span class="file-name"><span class="f-icon">' + getFileIcon(viewerState.filename) + '</span>' + escapeHtmlSafe(viewerState.filename) + '</span>' +
        '<span class="file-lang">editing</span>' +
        '<div class="viewer-toolbar">' +
          '<button class="viewer-toolbar-btn" onclick="downloadFile(\'' + escapeHtmlAttr(viewerState.path) + '\', \'' + escapeHtmlAttr(viewerState.filename) + '\')" title="下载文件">📥 下载</button>' +
          '<button class="btn-save" onclick="handleSaveEdit()" title="Ctrl+S">💾 保存</button>' +
          '<button class="btn-cancel" onclick="handleCancelEdit()" title="Escape">✕ 取消</button>' +
        '</div>';

      const content = viewerState.content;
      viewer.innerHTML = '';
      viewer.appendChild(headerDiv);
      const ta = document.createElement('textarea');
      ta.className = 'edit-textarea';
      ta.id = 'editTextarea';
      ta.spellcheck = false;
      ta.value = content;
      viewer.appendChild(ta);

      const statusBar = document.createElement('div');
      statusBar.className = 'edit-status-bar';
      statusBar.innerHTML =
        '<span>编辑模式 · ' + formatFileSize(content.length) + ' · ' + content.split('\n').length + ' 行</span>' +
        '<span class="dirty-indicator hidden" id="dirtyIndicator">● 已修改</span>';
      viewer.appendChild(statusBar);

      ta.addEventListener('input', function() {
        viewerState.content = ta.value;
        markDirty();
      });

      ta.focus();
      ta.setSelectionRange(ta.value.length, ta.value.length);
    }

    async function handleSaveEdit() {

      const ta = document.getElementById('editTextarea');
      if (ta) viewerState.content = ta.value;

        showToast('保存中...', 'info', 1000);

        clearDirty();
        viewerState.isEditing = false;
        renderFileViewer(viewerState.path, viewerState.filename, viewerState.content);
        showToast('保存成功 ✅', 'success');

    function refreshCurrentDirectory() {
      const dirPath = getCurrentDirectory();
      const treeContent = document.getElementById('fileTreeContent');
      // Invalidate loaded flags for the current directory's parent node in tree
      invalidateTreeCache(dirPath);
      treeContent.innerHTML = '';
      treeContent.appendChild(createInlineLoading('刷新目录...'));
      apiLs(dirPath || '/').then(function(entries) {
        treeContent.innerHTML = '';
        renderEntries(entries, treeContent, 0, dirPath || '');
      }).catch(function(err) {
        treeContent.innerHTML = '<div class="tree-item" style="padding-left:12px;color:var(--accent);">⚠️ ' + err.message + '</div>';
        showToast('目录刷新失败: ' + err.message, 'error');
      });
    }

    function invalidateTreeCache(dirPath) {
      // Recursively invalidate loaded flags for subtree
      const tree = document.getElementById('fileTreeContent');
      if (!tree) return;
      const traverse = function(node) {
        if (node.dataset && node.dataset.path === dirPath) {
          node.dataset.loaded = 'false';
          node.dataset.expanded = 'false';
          // Collapse children
          const siblings = node.parentNode ? node.parentNode.children : [];
          for (let i = 0; i < siblings.length; i++) {
            if (siblings[i].classList && siblings[i].classList.contains('tree-children') &&
                siblings[i].dataset && siblings[i].dataset.path === dirPath) {
              siblings[i].classList.add('collapsed');
            }
          }
          return;
        }
        if (node.children) {
          for (let i = 0; i < node.children.length; i++) traverse(node.children[i]);
        }
      };
      traverse(tree);
    }

    // 可拖动分隔条
    (function() {
      const handle = document.getElementById('resizeHandle');

      let isResizing = false;

      handle.addEventListener('mousedown', function(e) {
        isResizing = true;
        startX = e.clientX;
        startWidth = tree.offsetWidth;
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
        e.preventDefault();
      });

      document.addEventListener('mousemove', function(e) {
        if (!isResizing) return;
        const delta = e.clientX - startX;
        const newWidth = Math.max(180, Math.min(500, startWidth + delta));
        tree.style.width = newWidth + 'px';
      });

      document.addEventListener('mouseup', function() {
        if (isResizing) {
          isResizing = false;
          document.body.style.cursor = '';
          document.body.style.userSelect = '';
        }
      });
    })();

    /* ==================== 每日 Dashboard 卡片网格 (DF2) ==================== */

    let dashboardLoaded = false;

    /** 从 API 加载卡片配置并渲染网格 */
    async function loadDashboard() {
      const grid = document.getElementById('dashboardGrid');
      const token = document.getElementById('token').value;
      if (!token) {
        grid.innerHTML = '<div class="dashboard-loading">⚠️ 请先连接 API Token</div>';
        return;
      }

      try {
        const resp = await fetch('/v1/api/daily/config', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        if (!resp.ok) {
          throw new Error('HTTP ' + resp.status);
        }
        const data = await resp.json();
        dashboardCards = data.cards || [];
        renderDashboardGrid();
        updateCommandHint();
        setupCommandBarDragDrop();
        setupCmdTagSync();
        // 加载已实现卡片内容
        const newsCard = document.querySelector('[data-card-id="news"]');
        if (newsCard) loadNewsCard(newsCard);
        const todoCard = document.querySelector('[data-card-id="todo"]');
        if (todoCard) loadTodoCard(todoCard);
        const dataCard = document.querySelector('[data-card-id="data"]');
        if (dataCard) loadDataCard(dataCard);
        const recipeCard = document.querySelector('[data-card-id="recipe"]');
        if (recipeCard) loadRecipeCard(recipeCard);
        const wishesCard = document.querySelector('[data-card-id="wishes"]');
        if (wishesCard) loadWishesCard(wishesCard);
        const summaryCard = document.querySelector('[data-card-id="summary"]');
        if (summaryCard) loadSummaryCard(summaryCard);
        dashboardLoaded = true;
      } catch (e) {
        console.error('加载 Dashboard 失败:', e);
        grid.innerHTML = '<div class="dashboard-loading">⚠️ 加载失败，请检查 Token</div>';
      }
    }

    /** 渲染卡片网格 */
    function renderDashboardGrid() {
      const grid = document.getElementById('dashboardGrid');
      if (!dashboardCards.length) {
        grid.innerHTML = '<div class="dashboard-loading">暂无卡片，请先添加卡片</div>' +
          '<div class="card-add" onclick="showAddCardModal()" style="margin-top:12px">' +
            '<span class="add-icon">+</span><span>添加卡片</span>' +
          '</div>';
        return;
      }

      const config = JSON.parse(localStorage.getItem('aichat_dashboard_config') || '{}');
      const disabledCards = config.disabledCards || [];
      const layout = config.layout || {};
      const order = layout.order || dashboardCards.map(c => c.id);

      const ordered = order
        .map(id => dashboardCards.find(c => c.id === id))
        .filter(Boolean);
      for (const card of dashboardCards) {
        if (!ordered.find(c => c.id === card.id)) {
          ordered.push(card);
        }
      }

      let html = '';
      for (const card of ordered) {
        const isDisabled = disabledCards.includes(card.id) || !card.enabled;
        const cls = isDisabled ? 'card-placeholder disabled' : 'card-placeholder';
        const badgeText = isDisabled ? '已禁用' : '收折中';
        const summary = getCardSummary(card);
        const isImplemented = IMPLEMENTED_CARDS.includes(card.id);

        html += '<div class="' + cls + '" data-card-id="' + card.id + '"' +
          ' draggable="true"' +
          ' ondragstart="onDragStart(event, \'' + card.id + '\')"' +
          ' ondragend="onDragEnd(event)"' +
          ' ondragover="onDragOver(event)"' +
          ' ondragleave="onDragLeave(event)"' +
          ' ondrop="onDrop(event, \'' + card.id + '\')">' +
          '<div class="card-header" onclick="toggleCard(\'' + card.id + '\', event)">' +
            '<span class="drag-handle" title="拖拽排序">⠿</span>' +
            '<span class="card-name">' + card.name + '</span>' +
            '<div style="display:flex;align-items:center;gap:6px">' +
              '<span class="card-badge">' + badgeText + '</span>' +
              '<button class="card-expand-btn" title="展开">▾</button>' +
              '<button class="card-close-btn" title="收起" onclick="collapseCard(\'' + card.id + '\'); event.stopPropagation();">✕</button>' +
            '</div>' +
          '</div>' +
          '<div class="card-summary">' + summary + '</div>' +
          '<div class="card-body">' +
            (isImplemented
              ? '<div class="card-body-placeholder">⏳ 内容加载中...</div>'
              : '<div class="card-body-placeholder">📦 卡片待实现</div>') +
          '</div>' +
        '</div>';
      }
      // 添加卡片按钮（末尾）
      html += '<div class="card-add" onclick="showAddCardModal()">' +
        '<span class="add-icon">+</span><span>添加卡片</span>' +
      '</div>';
      grid.innerHTML = html;

    /* ===== 底部指令输入 (DF7) ===== */

    /** 发送指令到 /v1/api/daily/command */
    async function sendCommand() {
      const input = document.getElementById('cmdInput');
      const sendBtn = document.getElementById('cmdSend');
      const text = input.value.trim();
      if (!text) return;

      const token = document.getElementById('token').value;
      if (!token) {
        showCommandToast('⚠️ 请先连接 API Token', 'error');
        return;
      }

      input.disabled = true;
      sendBtn.disabled = true;
      sendBtn.textContent = '⏳';

      try {
        const resp = await fetch('/v1/api/daily/command', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token
          },
          body: JSON.stringify({ text })
        });
        const data = await resp.json();

        if (data.ok) {
          if (data.prefix) {
            // 指令匹配成功
            const msg = data.message || ('指令 ' + data.prefix + ' 已处理');
            showCommandToast('✅ ' + msg, 'success');
            // 如果涉及 todo 变更，重新加载面板
            if (data.prefix === '@todo' || data.prefix === '@done') {
              loadDashboard();
            }
          } else if (data.type === 'chat') {
            // 自然语言回退
            showCommandToast(data.content || '无回复', 'info');
          }
        } else {
          showCommandToast('⚠️ ' + (data.error || '请求失败'), 'error');
        }
      } catch (e) {
        console.error('发送指令失败:', e);
        showCommandToast('⚠️ 网络错误，请重试', 'error');
      } finally {
        input.disabled = false;
        sendBtn.disabled = false;
        sendBtn.textContent = '发送';
        input.value = '';
        input.focus();
      }
    }

    /** 显示 Toast 通知 */
    function showCommandToast(msg, type) {
      // 移除已有 toast
      document.querySelectorAll('.dashboard-toast').forEach(t => t.remove());

      const toast = document.createElement('div');
      toast.className = 'dashboard-toast ' + (type || 'info');
      toast.textContent = msg;

      // 关闭按钮
      const closeBtn = document.createElement('button');
      closeBtn.className = 'toast-close';
      closeBtn.innerHTML = '&times;';
      closeBtn.title = '关闭';
      closeBtn.onclick = function(e) {
        e.stopPropagation();
        dismissToast(toast);
      };
      toast.appendChild(closeBtn);

      // 点击 toast 任意位置也可关闭
      toast.addEventListener('click', function() { dismissToast(toast); });

      document.body.appendChild(toast);

      let dismissTimer = setTimeout(function() { dismissToast(toast); }, 6000);
      toast._dismissTimer = dismissTimer;
    }

    function dismissToast(toast) {
      if (!toast || toast._dismissed) return;
      toast._dismissed = true;
      if (toast._dismissTimer) clearTimeout(toast._dismissTimer);
      toast.style.animation = 'toastOut 0.2s ease forwards';
      setTimeout(function() {
        if (toast.parentNode) toast.remove();
      }, 200);
    }

    /** 加载面板时更新命令提示 */
    function updateCommandHint() {
      const hint = document.getElementById('cmdHint');
      // 从配置中读取前缀列表，默认显示已知前缀
      const knownPrefixes = ['@todo', '@done', '@data', '@news', '@recipe', '@schedule', '@wish', '@sum'];
      hint.textContent = knownPrefixes.join(' ');
    }

    /* ===== DF9: 拖拽上传区域 ===== */
    let dragCounter = 0;

    function setupCommandBarDragDrop() {
      const bar = document.getElementById('dashboard-command-bar');
      if (!bar) return;

      bar.addEventListener('dragenter', function(e) {
        e.preventDefault();
        e.stopPropagation();
        dragCounter++;
        bar.classList.add('drag-over');
      });

      bar.addEventListener('dragleave', function(e) {
        e.preventDefault();
        e.stopPropagation();
        dragCounter--;
        if (dragCounter <= 0) {
          dragCounter = 0;
          bar.classList.remove('drag-over');
        }
      });

      bar.addEventListener('dragover', function(e) {
        e.preventDefault();
        e.stopPropagation();
      });

      bar.addEventListener('drop', function(e) {
        e.preventDefault();
        e.stopPropagation();
        dragCounter = 0;
        bar.classList.remove('drag-over');

        const input = document.getElementById('cmdInput');
        if (!input) return;

        // 优先处理文本/URL 拖放 (如从文件管理器拖入)
        const textData = e.dataTransfer.getData('text/plain');
        const uriData = e.dataTransfer.getData('text/uri-list');

        let paths = [];

        if (textData) {
          // 按行分割，过滤空行
          paths = textData.split(/[\r\n]+/).map(function(s) {
            return s.trim().replace(/^file:\/\//, '');
          }).filter(function(s) { return s.length > 0; });
        }

        if (paths.length === 0 && uriData) {
          paths = uriData.split(/[\r\n]+/).map(function(s) {
            return s.trim().replace(/^file:\/\/\/?/, '');
          }).filter(function(s) { return s.length > 0; });
        }

        // 如果拖拽的是 web File 对象，使用文件名
        if (paths.length === 0 && e.dataTransfer.files.length > 0) {
          paths = Array.from(e.dataTransfer.files).map(function(f) {
            return f.name;
          });
        }

        if (paths.length > 0) {
          const current = input.value.trim();
          input.value = current ? current + ' ' + paths.join(' ') : paths.join(' ');
          input.focus();
          showCommandToast('📎 已添加 ' + paths.length + ' 个文件路径', 'info');
        }
      });
    }

    /** DF11: 命令栏文件附件标签管理 */
    function renderCmdFileTags() {
      const input = document.getElementById('cmdInput');
      const tagsContainer = document.getElementById('cmdFileTags');
      if (!input || !tagsContainer) return;

      const text = input.value.trim();
      if (!text) {
        tagsContainer.innerHTML = '';
        return;
      }

      const paths = text.split(/\s+/);
      const fileTokens = paths.filter(function(p) {
        return p.includes('/') || /\.\w{1,6}$/.test(p);
      });

      tagsContainer.innerHTML = fileTokens.map(function(p, i) {
        const fname = p.split('/').pop() || p;
        return '<span class="file-tag">' +
          '<span class="tag-icon">📎</span>' +
          '<span class="tag-name" title="' + escapeHtmlAttr(p) + '">' + escapeHtml(fname) + '</span>' +
          '<button class="tag-remove" onclick="event.stopPropagation();removeCmdFileTag(' + i + ')" title="移除">×</button>' +
          '</span>';
      }).join('');
    }

    function removeCmdFileTag(index) {
      const input = document.getElementById('cmdInput');
      if (!input) return;

      const text = input.value.trim();
      const paths = text.split(/\s+/);
      const fileTokens = paths.filter(function(p) {
        return p.includes('/') || /\.\w{1,6}$/.test(p);
      });
      const nonFileTokens = paths.filter(function(p) {
        return !(p.includes('/') || /\.\w{1,6}$/.test(p));
      });

      if (index >= 0 && index < fileTokens.length) {
        fileTokens.splice(index, 1);
      }

      input.value = nonFileTokens.concat(fileTokens).join(' ');
      renderCmdFileTags();
      input.focus();
    }

    /** 监听 cmdInput 变化以同步文件标签 */
    function setupCmdTagSync() {
      const input = document.getElementById('cmdInput');
      if (!input) return;
      input.addEventListener('input', function() {
        renderCmdFileTags();
      });
      input.addEventListener('blur', function() {
        setTimeout(function() { renderCmdFileTags(); }, 100);
      });
    }

    /** 拖拽：开始 */
    function onDragStart(e, cardId) {
      if (!layoutEditing) { e.preventDefault(); return; }
      const el = document.querySelector('.card-placeholder[data-card-id="' + cardId + '"]');
      if (!el || el.classList.contains('disabled')) { e.preventDefault(); return; }
      dragSourceId = cardId;
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', cardId);
      // delay 添加 dragging class 让浏览器能截图
      setTimeout(() => { el.classList.add('dragging'); }, 0);
    }

    /** 拖拽：结束 */
    function onDragEnd(e) {
      document.querySelectorAll('.card-placeholder.dragging').forEach(el => {
        el.classList.remove('dragging');
      });
      document.querySelectorAll('.card-placeholder.drag-over').forEach(el => {
        el.classList.remove('drag-over');
      });
      dragSourceId = null;
    }

    /** 拖拽：进入目标上方 */
    function onDragOver(e) {
      if (!layoutEditing) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      const el = e.currentTarget;
      if (el && !el.classList.contains('disabled')) {
        document.querySelectorAll('.card-placeholder.drag-over').forEach(x => {
          if (x !== el) x.classList.remove('drag-over');
        });
        el.classList.add('drag-over');
      }
    }

    /** 拖拽：离开目标 */
    function onDragLeave(e) {
      e.currentTarget.classList.remove('drag-over');
    }

    /** 拖拽：放下 */
    function onDrop(e, targetId) {
      e.preventDefault();
      e.stopPropagation();
      if (!layoutEditing || !dragSourceId || dragSourceId === targetId) return;

      // 在当前 dashboardCards 数组中重排
      const srcIdx = dashboardCards.findIndex(c => c.id === dragSourceId);
      const tgtIdx = dashboardCards.findIndex(c => c.id === targetId);
      if (srcIdx < 0 || tgtIdx < 0) return;

      const [moved] = dashboardCards.splice(srcIdx, 1);
      dashboardCards.splice(tgtIdx, 0, moved);

      // 重新渲染（数据已变，重建 DOM）
      renderDashboardGrid();

      // 编辑模式下恢复 edit-mode
      if (layoutEditing) {
        document.getElementById('dashboardGrid').classList.add('edit-mode');
      }
    }

        await fetch('/v1/api/daily/config', {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token
          },
          body: JSON.stringify({ layout: { order } })
        });
      } catch (e) {
        console.error('保存布局排序失败:', e);
      }

    /** DF17: TodoCard 展开模式 */
    let todoActivePerson = null;
    let todoActiveView = 'daily'; // 'daily' | 'weekly'

    function renderTodoCardExpanded(bodyEl, data) {
      if (!data || !data.persons || !Object.keys(data.persons).length) {

    async function loadTodoItems() {
      const container = document.getElementById('todoItemList');
      if (!container) return;

      const token = document.getElementById('token').value;
      if (!token) return;

      let url = '/v1/api/daily/todos?person=' + encodeURIComponent(todoActivePerson) + '&done=false';
      if (todoActiveView === 'weekly') {
        url = '/v1/api/daily/todos/week?person=' + encodeURIComponent(todoActivePerson) + '&done=false';
      }

      try {
        const resp = await fetch(url, { headers: { 'Authorization': 'Bearer ' + token } });
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const result = await resp.json();
        let items;
        if (todoActiveView === 'weekly') {
          items = [].concat(result.daily || [], result.weekly || []);
        } else {
          items = result.todos || result.items || [];
        }

        if (!items.length) {
          container.innerHTML = '<div class="todo-empty">🎉 全部完成！</div>';
          return;
        }

        container.innerHTML = items.map(function(item) {
          const text = escapeHtml(item.text || '');
          const isDone = item.done;
          const id = item.id;
          return '<div class="todo-item" data-id="' + id + '">' +
            '<input type="checkbox" class="todo-checkbox"' + (isDone ? ' checked' : '') + ' onchange="toggleTodoDone(' + id + ', this.checked)" title="完成">' +
            '<span class="todo-item-text' + (isDone ? ' done' : '') + '">' + text + '</span>' +
            '<button class="todo-item-delete" onclick="deleteTodoItem(' + id + ')" title="删除">🗑</button>' +
            '</div>';
        }).join('');
      } catch (e) {
        console.error('加载 Todo 列表失败:', e);
        container.innerHTML = '<div class="todo-empty">⚠️ 加载失败</div>';
      }
    }

    function switchTodoPerson(person) {
      todoActivePerson = person;
      const newsCard = document.querySelector('[data-card-id="todo"]');
      if (newsCard && cachedTodoData) {
        const body = newsCard.querySelector('.card-body');
        if (body) renderTodoCardExpanded(body, cachedTodoData);
      }
    }

    function switchTodoView(view) {
      todoActiveView = view;
      loadTodoItems();
    }

    async function toggleTodoDone(id, checked) {
      const token = document.getElementById('token').value;
      if (!token) return;

      try {
        const resp = await fetch('/v1/api/daily/todos/' + id, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({ done: checked ? 1 : 0 })
        });
        if (resp.ok) {
          // DF19: 即时动画 - 更新被勾选的条目
          const itemEl = document.querySelector('.todo-item[data-id="' + id + '"]');
          if (itemEl) {
            if (checked) {
              itemEl.classList.add('check-anim');
              itemEl.querySelector('.todo-item-text').classList.add('done');
            } else {
              itemEl.querySelector('.todo-item-text').classList.remove('done');
            }
            setTimeout(function() { itemEl.classList.remove('check-anim'); }, 500);
            updateTodoStats();
          }

          // 后台刷新缓存
          cachedTodoData = null;
          const todoCard = document.querySelector('[data-card-id="todo"]');
          if (todoCard) {
            await loadTodoCard(todoCard);
            const body = todoCard ? todoCard.querySelector('.card-body') : null;
            if (body && todoCard.classList.contains('expanded')) {
              loadTodoItems(); // 重新加载列表
            }
          }
        }
      } catch (e) {
        console.error('Toggle todo failed:', e);
      }
    }

    /** DF19: 即时更新统计栏 */
    function updateTodoStats() {
      const items = document.querySelectorAll('#todoItemList .todo-item');
      if (!items.length) return;
      const total = items.length;
      const done = document.querySelectorAll('#todoItemList .todo-item .todo-item-text.done').length;
      const pct = Math.round(done / total * 100);
      const stats = document.querySelector('.todo-expanded .todo-stats');
      const bar = document.querySelector('.todo-stats-bar-fill');
      if (stats) stats.textContent = '✅ ' + done + ' / ' + total + ' 已完成 (' + pct + '%)';
      if (bar) bar.style.width = pct + '%';
    }
