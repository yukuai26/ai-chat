    /* ===== DF20: DataCard ===== */
    let cachedDataSummary = null;
    const KNOWN_PERSONS_DATA = ["管理员", "伴侣"];

    async function loadDataCard(cardEl) {
      if (!cardEl) return;
      const summary = cardEl.querySelector('.card-summary');
      const body = cardEl.querySelector('.card-body');
      if (!body) return;

      const token = document.getElementById('token').value;
      if (!token) {
        if (summary) summary.textContent = '⚠️ 请先连接 API Token';
        return;
      }

      try {
        if (!cachedDataSummary) {
          const today = new Date().toISOString().slice(0, 10);
          const results = {};
          for (const person of KNOWN_PERSONS_DATA) {
            const resp = await fetch('/v1/api/daily/data/' + encodeURIComponent(person) + '?date=' + today, {
              headers: { 'Authorization': 'Bearer ' + token }
            });
            if (resp.ok) {
              const d = await resp.json();
              results[person] = d;
            }
          }
          cachedDataSummary = { date: today, persons: results };
        }

        renderDataCardCollapsed(summary, body, cachedDataSummary);
      } catch (e) {
        console.error('加载 Data 失败:', e);
        body.innerHTML = '<div class="card-body-placeholder">⚠️ 数据加载失败</div>';
      }
    }

    function renderDataCardCollapsed(summaryEl, bodyEl, data) {
      if (!data || !data.persons || !Object.keys(data.persons).length) {
        if (summaryEl) summaryEl.textContent = '📊 暂无数据';
        bodyEl.innerHTML = '<div class="card-body-placeholder">📊 暂无数据</div>';
        return;
      }

      // 统计每人今天的数据条目数
      let html = '<div class="data-collapsed">';
      for (const [name, d] of Object.entries(data.persons)) {
        let updateCount = 0;
        if (d && d.ok) {
          for (const field of ['weight', 'water', 'sleep', 'exercise', 'journal', 'fitness', 'finance']) {
            if (d[field] && Array.isArray(d[field]) && d[field].length) updateCount += d[field].length;
          }
        }
        html += '<div class="data-person-row">';
        html += '<span class="data-person-name">👤 ' + escapeHtml(name) + '</span>';
        html += '<span class="data-person-info">今天更新 ' + updateCount + ' 项</span>';
        html += '</div>';
      }
      html += '<div class="data-expand-hint" onclick="toggleCard(\'data\', event)">展开查看详情 ▼</div>';
      html += '</div>';

      if (summaryEl) summaryEl.innerHTML = html;
      // 展开模式
      renderDataCardExpanded(bodyEl, data);
    }


    /** DF21: DataCard 展开模式 */
    let dataActivePerson = '管理员';

    const DATA_FIELDS_META = [
      { key: 'weight',     icon: '⚖️', label: '体重', unit: 'kg' },
      { key: 'water',      icon: '💧', label: '喝水', unit: '杯' },
      { key: 'sleep',      icon: '😴', label: '睡眠', unit: 'h' },
      { key: 'exercise',   icon: '🏃', label: '运动', unit: 'kcal' },
      { key: 'journal',    icon: '📝', label: '日记', unit: '' },
      { key: 'fitness',    icon: '💪', label: '健身', unit: 'kcal' },
      { key: 'finance',    icon: '💰', label: '财务', unit: '¥' }
    ];

    function renderDataCardExpanded(bodyEl, data) {
      const persons = Object.keys(data.persons || {});
      if (!persons.length) {
        bodyEl.innerHTML = '<div class="card-body-placeholder">📊 暂无数据</div>';
        return;
      }
      if (!persons.includes(dataActivePerson)) dataActivePerson = persons[0];

      let html = '<div class="data-expanded">';

      // Person tabs
      html += '<div class="data-tabs">';
      for (const p of persons) {
        const active = p === dataActivePerson ? ' active' : '';
        html += '<button class="data-tab' + active + '" onclick="switchDataPerson(\'' + escapeHtml(p) + '\')">👤 ' + escapeHtml(p) + '</button>';
      }
      html += '</div>';

      // Field list
      const personData = data.persons[dataActivePerson] || {};
      for (const field of DATA_FIELDS_META) {
        const fieldData = personData[field.key] || [];
        let value = '—';
        if (fieldData.length > 0) {
          const entry = fieldData[fieldData.length - 1];
          if (field.key === 'weight') value = (entry.value != null ? entry.value : '—');
          else if (field.key === 'water') value = (entry.cups != null ? entry.cups : '—');
          else if (field.key === 'sleep') value = (entry.hours != null ? entry.hours : '—');
          else if (field.key === 'exercise') value = (entry.duration != null ? entry.duration + 'min ' + (entry.calories || '') : '—');
          else if (field.key === 'fitness') value = (entry.duration || entry.calories || '—');
          else value = (entry.value != null ? entry.value : (entry.text || '—'));
        }
        html += '<div class="data-field-item">';
        html += '<span class="data-field-icon">' + field.icon + '</span>';
        html += '<span class="data-field-label">' + field.label + '</span>';
        html += '<span class="data-field-value" onclick="editDataField(\'' + field.key + '\', this)" data-key="' + field.key + '">' + escapeHtml(String(value)) + '</span>';
        html += '<span class="data-field-unit">' + field.unit + '</span>';
        html += '</div>';
      }

      html += '</div>';
      bodyEl.innerHTML = html;
    }

    function switchDataPerson(person) {
      dataActivePerson = person;
      const card = document.querySelector('[data-card-id="data"]');
      if (card && cachedDataSummary) {
        const body = card.querySelector('.card-body');
        if (body) renderDataCardExpanded(body, cachedDataSummary);
      }
    }

    /** DF22: 数据编辑弹窗 */
    async function editDataField(fieldKey, el) {
      const field = DATA_FIELDS_META.find(f => f.key === fieldKey);
      if (!field) return;

      const oldValue = el.textContent.trim();
      const existing = document.getElementById('dataEditOverlay');
      if (existing) existing.remove();

      const overlay = document.createElement('div');
      overlay.className = 'data-edit-overlay';
      overlay.id = 'dataEditOverlay';
      overlay.onclick = function(e) { if (e.target === overlay) closeDataEdit(); };

      overlay.innerHTML =
        '<div class="data-edit-dialog">' +
          '<h3>' + field.icon + ' ' + field.label + ' (👤 ' + dataActivePerson + ')</h3>' +
          '<div class="data-edit-old">旧值: <span class="data-edit-old-value">' + escapeHtml(oldValue) + (field.unit ? ' ' + field.unit : '') + '</span></div>' +
          '<input type="text" id="dataEditInput" placeholder="输入新值..." value="">' +
          '<div class="data-edit-actions">' +
            '<button class="btn-data-cancel" onclick="closeDataEdit()">取消</button>' +
            '<button class="btn-data-save" onclick="saveDataEdit(\'' + fieldKey + '\')">✅ 确认</button>' +
          '</div>' +
        '</div>';

      document.body.appendChild(overlay);
      const inp = document.getElementById('dataEditInput');
      if (inp) inp.focus();
    }

    function closeDataEdit() {
      const overlay = document.getElementById('dataEditOverlay');
      if (overlay) overlay.remove();
    }

    /** DF22: 保存数据编辑（弹窗版本） */
    async function saveDataEdit(fieldKey) {
      const input = document.getElementById('dataEditInput');
      if (!input) return;
      const value = input.value.trim();
      if (!value) { showCommandToast('⚠️ 请输入新值', 'error'); return; }

      const person = dataActivePerson;
      const token = document.getElementById('token').value;
      if (!token) { closeDataEdit(); return; }

      try {
        const payload = {};
        const field = DATA_FIELDS_META.find(f => f.key === fieldKey);
        if (fieldKey === 'weight') payload[fieldKey] = { value: parseFloat(value) || 0 };
        else if (fieldKey === 'water') { payload[fieldKey] = { cups: parseInt(value, 10) || 0, total_ml: (parseInt(value, 10) || 0) * 250 }; }
        else if (fieldKey === 'sleep') payload[fieldKey] = { hours: parseFloat(value) || 0 };
        else if (fieldKey === 'exercise') payload[fieldKey] = { duration: value + ' min' };
        else payload[fieldKey] = { value: value };

        const resp = await fetch('/v1/api/daily/data/' + encodeURIComponent(person), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify(payload)
        });
        const result = await resp.json();

        if (resp.ok && result.ok) {
          closeDataEdit();
          cachedDataSummary = null;
          const card = document.querySelector('[data-card-id="data"]');
          if (card) {
            await loadDataCard(card);
            const bodyEl = card.querySelector('.card-body');
            if (bodyEl && card.classList.contains('expanded')) {
              renderDataCardExpanded(bodyEl, cachedDataSummary);
            }
          }
          showCommandToast('✅ ' + (field ? field.label : fieldKey) + ' 已更新', 'success');
        } else {
          showCommandToast('⚠️ ' + ((result && result.error) || '保存失败'), 'error');
        }
      } catch (e) {
        console.error('保存数据失败:', e);
        showCommandToast('⚠️ 网络错误', 'error');
      }
    }

    async function renderRecipeCardExpanded(bodyEl, todayData) {

      if (!token) return;

      try {

    /* ===== DF25: WishesCard ===== */
    let cachedWishesData = null;

    const WISH_STATUS_LABELS = {
      'idea': '💡 想法',
      'discussing': '💬 讨论中',
      'designing': '📐 设计中',
      'implementing': '🔨 实现中',
      'done': '✅ 完成',
      'archived': '📦 归档'
    };

    async function loadWishesCard(cardEl) {
      if (!cardEl) return;
      const summary = cardEl.querySelector('.card-summary');
      const body = cardEl.querySelector('.card-body');
      if (!body) return;

      const token = document.getElementById('token').value;
      if (!token) {
        if (summary) summary.textContent = '⚠️ 请先连接 API Token';
        return;
      }

      try {
        if (!cachedWishesData) {
          const resp = await fetch('/v1/api/daily/wishes', {
            headers: { 'Authorization': 'Bearer ' + token }
          });
          if (!resp.ok) throw new Error('HTTP ' + resp.status);
          cachedWishesData = await resp.json();
        }

        renderWishesCardCollapsed(summary, body, cachedWishesData);
      } catch (e) {
        console.error('加载心愿失败:', e);
        body.innerHTML = '<div class="card-body-placeholder">⚠️ 心愿加载失败</div>';
      }
    }

    function renderWishesCardCollapsed(summaryEl, bodyEl, data) {
      const wishes = data && data.wishes ? data.wishes : [];
      const total = data && data.total != null ? data.total : wishes.length;

      if (!total) {
        if (summaryEl) summaryEl.innerHTML = '<div class="wishes-collapsed"><div style="text-align:center;color:var(--text-secondary);font-size:12px;padding:8px;">💡 暂无心愿</div></div>';
        bodyEl.innerHTML = '<div class="card-body-placeholder">展开中...</div>';
        return;
      }

      // 统计各状态数量
      const statusCounts = {};
      for (const w of wishes) {
        const s = w.status || 'idea';
        statusCounts[s] = (statusCounts[s] || 0) + 1;
      }

      let html = '<div class="wishes-collapsed">';
      html += '<div class="wishes-total">💡 共 <strong>' + total + '</strong> 个心愿</div>';
      html += '<div class="wishes-status-list">';

      const order = ['idea', 'discussing', 'designing', 'implementing', 'done', 'archived'];
      for (const status of order) {
        if (statusCounts[status]) {
          const label = WISH_STATUS_LABELS[status] || status;
          html += '<span class="wishes-status-tag">' + label + ' <span class="count">' + statusCounts[status] + '</span></span>';
        }
      }
      html += '</div>';
      html += '<div class="wishes-expand-hint" onclick="toggleCard(\'wishes\', event)">展开查看详情 ▼</div>';
      html += '</div>';

      if (summaryEl) summaryEl.innerHTML = html;
      // DF26: 展开 → 列表 + 筛选
      renderWishesCardExpanded(bodyEl, data);
    }


    /** DF26: WishesCard 展开模式 */
    let wishesActiveFilter = 'all';

    function renderWishesCardExpanded(bodyEl, data) {
      const wishes = data && data.wishes ? data.wishes : [];
      const total = data && data.total != null ? data.total : wishes.length;

      let html = '<div class="wishes-expanded">';

      // Filter tabs
      html += '<div class="wishes-filter-tabs">';
      html += '<button class="wishes-filter-tab' + (wishesActiveFilter === 'all' ? ' active' : '') + '" onclick="switchWishesFilter(\'all\')">全部 (' + total + ')</button>';
      for (const status of ['idea', 'discussing', 'designing', 'implementing', 'done', 'archived']) {
        const count = wishes.filter(function(w) { return w.status === status; }).length;
        if (count > 0) {
          const label = WISH_STATUS_LABELS[status] || status;
          html += '<button class="wishes-filter-tab' + (wishesActiveFilter === status ? ' active' : '') + '" onclick="switchWishesFilter(\'' + status + '\')">' + label + ' (' + count + ')</button>';
        }
      }
      html += '</div>';

      // Wishes list
      const filtered = wishesActiveFilter === 'all' ? wishes : wishes.filter(function(w) { return w.status === wishesActiveFilter; });
      if (!filtered.length) {
        html += '<div class="wishes-item-empty">' + (wishesActiveFilter === 'all' ? '💡 暂无心愿' : '该状态暂无') + '</div>';
      } else {
        for (const w of filtered) {
          const statusLabel = (WISH_STATUS_LABELS[w.status] || w.status).replace(/^[^ ]+ /, '');
          const tags = (w.tags || []).map(t => '<span style="color:var(--text-secondary);font-size:10px;">#' + escapeHtml(t) + '</span>').join(' ');
          const dataEnc = encodeURIComponent(JSON.stringify(w));
          html += '<div class="wishes-item" onclick="showWishDetail(decodeURIComponent(\'' + dataEnc + '\'))" title="查看详情">';
          html += '<div class="wishes-item-title">' + escapeHtml(w.text) + '</div>';
          html += '<div class="wishes-item-meta">';
          html += '<span class="wishes-status-badge ' + w.status + '">' + statusLabel + '</span>';
          html += tags;
          html += '</div>';
          html += '</div>';
        }
      }

      html += '</div>';
      bodyEl.innerHTML = html;
    }

    function switchWishesFilter(status) {
      wishesActiveFilter = status;
      const card = document.querySelector('[data-card-id="wishes"]');
      if (card && cachedWishesData) {
        const body = card.querySelector('.card-body');
        if (body) renderWishesCardExpanded(body, cachedWishesData);
      }
    }

    function showWishDetail(encoded) {
      let wish;
      try {
        wish = typeof encoded === 'string' ? JSON.parse(encoded) : encoded;
      } catch (e) { return; }

      const existing = document.getElementById('wishDetailOverlay');
      if (existing) existing.remove();

      const overlay = document.createElement('div');
      overlay.className = 'wish-detail-overlay';
      overlay.id = 'wishDetailOverlay';
      overlay.onclick = function(e) { if (e.target === overlay) closeWishDetail(); };

      const statusLabel = WISH_STATUS_LABELS[wish.status] || wish.status;
      const note = wish.note || '';
      const link = wish.link || '';
      const tags = (wish.tags || []).map(t => '#' + escapeHtml(t)).join(' ');

      overlay.innerHTML =
        '<div class="wish-detail-dialog">' +
          '<h3>' + escapeHtml(wish.text) + '</h3>' +
          '<div class="wish-detail-meta">' +
            '<span class="wishes-status-badge ' + wish.status + '">' + statusLabel + '</span>' +
            (tags ? '<span>' + tags + '</span>' : '') +
          '</div>' +
          (note ? '<div class="wish-detail-note">' + escapeHtml(note) + '</div>' : '') +
          '<div class="wish-detail-actions">' +
            '<button class="btn-data-cancel" onclick="closeWishDetail()">关闭</button>' +
            (link ? '<a href="' + link + '" target="_blank" class="btn-data-save" style="text-decoration:none;">🔗 链接</a>' : '') +
          '</div>' +
        '</div>';

      document.body.appendChild(overlay);
    }

    function closeWishDetail() {
      const overlay = document.getElementById('wishDetailOverlay');
      if (overlay) overlay.remove();
    }


    /* ===== DF27: 图表组件 ===== */
    let cachedSummaryData = null;
    let chartInstances = {};

    async function loadSummaryCard(cardEl) {
      if (!cardEl) return;
      const summary = cardEl.querySelector('.card-summary');
      const body = cardEl.querySelector('.card-body');
      if (!body) return;

      const token = document.getElementById('token').value;
      if (!token) {
        if (summary) summary.textContent = '⚠️ 请先连接 API Token';
        return;
      }

      try {
        if (!cachedSummaryData) {
          const resp = await fetch('/v1/api/daily/summary/week', {
            headers: { 'Authorization': 'Bearer ' + token }
          });
          if (!resp.ok) throw new Error('HTTP ' + resp.status);
          cachedSummaryData = await resp.json();
        }

        renderSummaryCardCollapsed(summary, cachedSummaryData);
        // 展开视图在 body 中渲染图表
      } catch (e) {
        console.error('加载总结失败:', e);
        body.innerHTML = '<div class="card-body-placeholder">⚠️ 加载失败</div>';
      }
    }

    function renderSummaryCardCollapsed(summaryEl, data) {
      if (!data || !data.ok) {
        if (summaryEl) summaryEl.textContent = '📊 暂无数据';
        return;
      }
      const ex = data.exercise || {};
      const todo = data.todo || {};
      const week = data.week || '';
      const weekLabel = week ? ' (W' + (week.split('-W')[1] || '') + ')' : '';

      let html = '<div class="wishes-collapsed">';
      html += '<div style="font-size:13px;margin-bottom:6px;">📊 本周' + weekLabel + '</div>';
      html += '<div style="font-size:12px;color:var(--text-secondary);">';
      html += '🏃 运动 ' + (ex.days || 0) + ' 天 · 📋 Todo ' + (todo.completion_rate || 0) + '%';
      html += '</div>';
      html += '<div class="wishes-expand-hint" onclick="toggleCard(\'summary\', event)">展开查看图表 ▼</div>';
      html += '</div>';

      if (summaryEl) summaryEl.innerHTML = html;
    }

    function renderSummaryCharts(bodyEl, data) {
      if (!data || !data.ok) {
        bodyEl.innerHTML = '<div class="card-body-placeholder">📊 暂无数据</div>';
        return;
      }

      // 销毁旧图表
      for (const key in chartInstances) {
        if (chartInstances[key]) { chartInstances[key].destroy(); chartInstances[key] = null; }
      }
      chartInstances = {};

      const ex = data.exercise || {};
      const todo = data.todo || {};
      const trends = data.data_trends || {};

      let html = '<div class="summary-charts">';

      // 统计概览
      html += '<div class="chart-section-title">📊 本周概览</div>';
      html += '<div class="summary-stats-grid">';
      html += '<div class="summary-stat-item"><div class="summary-stat-value">' + (ex.days || 0) + '</div><div class="summary-stat-label">运动天数</div></div>';
      html += '<div class="summary-stat-item"><div class="summary-stat-value">' + (ex.total_min || 0) + 'min</div><div class="summary-stat-label">运动时长</div></div>';
      html += '<div class="summary-stat-item"><div class="summary-stat-value">' + (todo.completion_rate || 0) + '%</div><div class="summary-stat-label">Todo 完成率</div></div>';
      html += '<div class="summary-stat-item"><div class="summary-stat-value">' + (todo.done || 0) + '/' + (todo.total || 0) + '</div><div class="summary-stat-label">已完成/总数</div></div>';
      html += '</div>';

      // Chart.js 画布
      html += '<div class="chart-section-title">📋 Todo 完成率</div>';
      html += '<canvas id="chartTodoRate"></canvas>';

      // 数据趋势 -- 体重
      for (const person of ['管理员', '伴侣']) {
        if (trends[person] && trends[person].weight) {
          html += '<div class="chart-section-title">⚖️ ' + person + ' 体重趋势</div>';
          html += '<canvas id="chartWeight_' + person + '"></canvas>';
        }
      }

      html += '</div>';
      bodyEl.innerHTML = html;

      // 渲染图表
      setTimeout(function() {
        // Todo 完成率 doughnut
        const ctx1 = document.getElementById('chartTodoRate');
        if (ctx1) {
          const done = todo.done || 0;
          const pending = (todo.total || 0) - done;
          chartInstances['todoRate'] = new Chart(ctx1, {
            type: 'doughnut',
            data: {
              labels: ['已完成', '未完成'],
              datasets: [{
                data: [done, pending > 0 ? pending : 0],
                backgroundColor: ['#4caf50', '#e0e0e0'],
                borderWidth: 0
              }]
            },
            options: {
              responsive: true, maintainAspectRatio: false,
              plugins: { legend: { position: 'bottom', labels: { font: { size: 10 } } } }
            }
          });
          ctx1.parentElement.style.height = '150px';
        }

        // 体重趋势线图
        for (const person of ['管理员', '伴侣']) {
          const ctxW = document.getElementById('chartWeight_' + person);
          if (ctxW && trends[person] && trends[person].weight) {
            const entries = trends[person].weight;
            const labels = entries.map(function(e) { return (e.date || '').slice(5); });
            const values = entries.map(function(e) { return e.value; });
            chartInstances['weight_' + person] = new Chart(ctxW, {
              type: 'line',
              data: {
                labels: labels,
                datasets: [{
                  label: person + ' 体重',
                  data: values,
                  borderColor: '#42a5f5',
                  backgroundColor: 'rgba(66,165,245,0.1)',
                  fill: true,
                  tension: 0.3,
                  pointRadius: 3
                }]
              },
              options: {
                responsive: true, maintainAspectRatio: false,
                scales: { y: { beginAtZero: false } },
                plugins: { legend: { labels: { font: { size: 10 } } } }
              }
            });
            ctxW.parentElement.style.height = '160px';
          }
        }
      }, 100);
    }

    // Hook into toggleCard to render charts when summary expands
    const _origToggleCard2 = toggleCard;
    toggleCard = function(cardId, event) {
      _origToggleCard2(cardId, event);
      if (cardId === 'summary') {
        const card = document.querySelector('[data-card-id="summary"]');
        if (card && card.classList.contains('expanded') && cachedSummaryData) {
          const body = card.querySelector('.card-body');
          if (body) renderSummaryCharts(body, cachedSummaryData);
        }
      }
    };


    const origSwitchTab2 = switchTab;
    switchTab = function(tabName) {
      origSwitchTab2(tabName);
      if (tabName === 'daily') { loadDashboard(); }
    };

  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</body>
</html>
